าย<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"grid grid-cols-1 md:grid-cols-3 gap-3\">\n      ${st.cost.map(f => `<div class=\"flex flex-col gap-1.5\">\n        <label class=\"lbl\">${escHtml(f.label)}<\u002Flabel>\n        <input class=\"inp\" type=\"number\" min=\"0\" inputmode=\"decimal\" id=\"inp_${f.id}\" data-key=\"${f.key}\" placeholder=\"0\" value=\"${escHtml(D[f.key]||'')}\">\n      <\u002Fdiv>`).join('')}\n    <\u002Fdiv>\n    <div class=\"mt-3\">\n      <label class=\"lbl\">รายละเอียดค่าใช้จ่าย <span class=\"sub\">(ไม่บังคับ)<\u002Fspan><\u002Flabel>\n      <input class=\"inp mt-1\" id=\"inp_cost_detail\" placeholder=\"เช่น ค่าถุง 50, น้ำแข็ง 40\" value=\"${escHtml(D.costDetails||'')}\">\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction renderBoxEggSection(st, D){\n  return `<div class=\"card p-5\">\n    <div class=\"flex items-center gap-2 mb-3\">\n      <i data-lucide=\"boxes\"><\u002Fi>\n      <span class=\"font-semibold text-[14.5px]\">กล่อง / ไข่ — ต้นวัน · ปลายวัน<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"grid grid-cols-2 md:grid-cols-4 gap-3\">\n      ${st.boxegg.map(f => `<div class=\"flex flex-col gap-1.5\">\n        <label class=\"lbl\">${escHtml(f.label)}<\u002Flabel>\n        <input class=\"inp\" type=\"number\" min=\"0\" inputmode=\"decimal\" id=\"inp_${f.id}\" data-key=\"${f.key}\" placeholder=\"0\" value=\"${escHtml(D[f.key]||'')}\">\n      <\u002Fdiv>`).join('')}\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction bindEntryInputs(){\n  document.querySelectorAll('#view input.inp, #view textarea.inp').forEach(el => {\n    el.addEventListener('input', e=>{\n      const key = el.dataset.key || (el.id==='inp_note'?'note':el.id==='inp_cost_detail'?'costDetails':null);\n      if(!key) return;\n      const v = el.type==='number' ? el.value : el.value;\n      state.formDraft[key] = v;\n      recalcEntry();\n    });\n  });\n}\n\nfunction renderDynCosts(){\n  const el = document.getElementById('dyn_costs');\n  if(!el) return;\n  el.innerHTML = state.dynCosts.map((c,i)=>`\n    <div class=\"flex gap-2\">\n      <input class=\"inp\" style=\"flex:1;max-width:140px;\" type=\"number\" min=\"0\" placeholder=\"฿ จำนวน\" value=\"${escHtml(c.amt||'')}\" oninput=\"state.dynCosts[${i}].amt=this.value;recalcEntry()\">\n      <input class=\"inp\" style=\"flex:3;\" placeholder=\"รายละเอียด เช่น ทิชชู่\" value=\"${escHtml(c.desc||'')}\" oninput=\"state.dynCosts[${i}].desc=this.value\">\n      <button class=\"btn btn-icon\" onclick=\"state.dynCosts.splice(${i},1);renderDynCosts();recalcEntry()\"><i data-lucide=\"x\"><\u002Fi><\u002Fbutton>\n    <\u002Fdiv>\n  `).join('');\n  lucide.createIcons({nodes: el.querySelectorAll('[data-lucide]')});\n}\nfunction addDynCost(){ state.dynCosts.push({amt:'',desc:''}); renderDynCosts(); }\n\nfunction renderInventoryArea(){\n  const el = document.getElementById('inv_area');\n  if(!el) return;\n  const st = state.stores[state.activeStore];\n  el.innerHTML = st.catalog.map((sec,ci) => `\n    <div class=\"mb-4 last:mb-0\">\n      <div class=\"text-[11px] font-semibold muted-2 tracking-widest mb-2\">${escHtml(sec.cat)}<\u002Fdiv>\n      <div class=\"flex flex-wrap gap-1.5\">\n        ${sec.items.map(name => {\n          const s = state.invState[name]||'normal';\n          const note = state.invNotes[name]||'';\n          return `<button type=\"button\" class=\"ic-chip ${s==='low'?'low':s==='out'?'out':''}\" onclick=\"cycleInvState('${escHtml(name).replace(/'/g,\"\\\\'\")}')\">\n            <span class=\"dot\"><\u002Fspan>\n            <span>${escHtml(name)}<\u002Fspan>\n            ${s==='low'?`<input class=\"ic-qty\" placeholder=\"จำนวน\" value=\"${escHtml(note)}\" onclick=\"event.stopPropagation()\" oninput=\"state.invNotes['${escHtml(name).replace(/'/g,\"\\\\'\")}']=this.value\">`:''}\n          <\u002Fbutton>`;\n        }).join('')}\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `).join('');\n}\n\nfunction recalcEntry(){\n  const D = state.formDraft;\n  // collect all current values from DOM\n  const id = state.activeStore;\n  const def = STORE_DEFS[id];\n  const st = state.stores[id];\n  const values = {};\n  [...st.basic, ...st.sale, ...st.cost, ...(def.hasBoxEgg?st.boxegg:[])].forEach(f => {\n    const el = document.getElementById('inp_'+f.id);\n    if(el){ values[f.key] = el.value; D[f.key] = el.value; }\n  });\n  const net = computeNet(id, values, state.dynCosts);\n  const total = computeTotal(id, values);\n  const ne = document.getElementById('net_val');\n  const te = document.getElementById('total_val');\n  if(ne){\n    ne.textContent = fmtMoney(net);\n    ne.style.color = net<0 ? 'var(--neg)' : 'var(--accent-ink)';\n  }\n  if(te){\n    te.textContent = def.saleType==='units' ? `${fmt(total)} ${def.salesUnit}` : `${fmt(total)} เสิร์ฟ`;\n  }\n}\n\nasync function saveEntry(){\n  const id = state.activeStore;\n  const def = STORE_DEFS[id];\n  const st = state.stores[id];\n  const D = state.formDraft;\n  // Collect\n  const values = {};\n  [...st.basic, ...st.sale, ...st.cost, ...(def.hasBoxEgg?st.boxegg:[])].forEach(f => {\n    const el = document.getElementById('inp_'+f.id);\n    if(el){\n      values[f.key] = el.type==='number' ? (parseFloat(el.value)||0) : el.value.trim();\n    }\n  });\n  const noteEl = document.getElementById('inp_note'); if(noteEl) values.note = noteEl.value.trim();\n  const cdEl = document.getElementById('inp_cost_detail'); if(cdEl) values.costDetails = cdEl.value.trim();\n  if(!values.date){ toast('กรุณาเลือกวันที่','er'); return; }\n  // Required check\n  for(const f of [...st.basic, ...st.sale]){\n    if(f.req && (!values[f.key] && values[f.key]!==0)){ toast(`กรอก ${f.label}`,'er'); return; }\n  }\n  const dateISO = values.date;\n  const inv = getInventorySummary();\n  const rec = {\n    ...values,\n    dateISO,\n    costsDyn: def.hasDynCosts ? state.dynCosts.filter(c=>c.amt||c.desc).map(c=>({amt:+c.amt||0, desc:c.desc||''})) : undefined,\n    leftItems: inv.leftItems,\n    outItems: inv.outItems,\n    net: computeNet(id, values, state.dynCosts),\n    total: computeTotal(id, values),\n    ts: Date.now(),\n    synced: false\n  };\n\n  // Upsert by dateISO\n  const ei = st.records.findIndex(r => (r.dateISO||r.date) === dateISO);\n  if(ei>=0){\n    if(!confirm(`มีข้อมูลของวันที่ ${fmtDate(dateISO)} อยู่แล้ว — ทับใหม่?`)) return;\n    rec.ts = st.records[ei].ts;\n    st.records[ei] = rec;\n  } else {\n    st.records.push(rec);\n  }\n  st.records.sort((a,b)=>(a.dateISO||a.date).localeCompare(b.dateISO||b.date));\n  LS.set(k(id,'records'), st.records);\n\n  // Submit\n  if(st.hook){\n    toast('⏳ กำลังส่ง LINE & Sheets...','in');\n    const r = await postWebhook(id, rec);\n    if(r.ok){\n      rec.synced = true;\n      LS.set(k(id,'records'), st.records);\n      toast('✅ บันทึก + ส่งสำเร็จ','ok');\n    } else {\n      toast('💾 บันทึกแล้ว · ส่งไม่ได้ (กด ส่งซ้ำในประวัติ)','er');\n    }\n  } else {\n    toast('💾 บันทึกแล้ว · ยังไม่ได้ตั้งค่าเชื่อมต่อ','in');\n  }\n  clearForm();\n}\n\nfunction clearForm(){\n  state.formDraft = { date: todayISO() };\n  state.dynCosts = [];\n  resetInventory();\n  renderView();\n}\n<\u002Fscript>\n\n<!-- ============================================================== -->\n<!-- VIEW: HISTORY (ประวัติ)                                          -->\n<!-- ============================================================== -->\n<script>\nfunction renderHistory(root){\n  const id = state.activeStore;\n  const def = STORE_DEFS[id];\n  const st = state.stores[id];\n  const records = [...st.records].reverse(); // newest first\n  const q = (state.search||'').toLowerCase();\n  const filtered = q ? records.filter(r => {\n    return JSON.stringify(r).toLowerCase().includes(q);\n  }) : records;\n  const synced = st.records.filter(r=>r.synced).length;\n  const pending = st.records.length - synced;\n  const totalNet = st.records.reduce((s,r)=>s+(r.net||0),0);\n  const totalTx = st.records.reduce((s,r)=>s+(r.total||0),0);\n\n  root.innerHTML = `\n    <div class=\"flex flex-col gap-4 max-w-[1400px]\">\n      <div class=\"flex items-center justify-between flex-wrap gap-3\">\n        <div class=\"flex flex-wrap gap-2\">\n          <span class=\"pill\"><b class=\"num\">${fmt(st.records.length)}<\u002Fb>&nbsp;วันบันทึก<\u002Fspan>\n          <span class=\"pill pill-pos\"><b class=\"num\">${fmtMoney(totalNet)}<\u002Fb>&nbsp;รวมสุทธิ<\u002Fspan>\n          <span class=\"pill pill-accent\"><b class=\"num\">${fmt(totalTx)}<\u002Fb>&nbsp;${def.salesUnit==='฿'?'เสิร์ฟ':def.salesUnit}<\u002Fspan>\n          ${pending?`<span class=\"pill pill-warn\">${pending} รอส่ง<\u002Fspan>`:''}\n          ${synced?`<span class=\"pill pill-pos\" style=\"opacity:.8\">${synced} ส่งแล้ว<\u002Fspan>`:''}\n        <\u002Fdiv>\n        <div class=\"flex gap-2 flex-wrap\">\n          <div class=\"relative\">\n            <i data-lucide=\"search\" class=\"absolute left-3 top-1/2 -translate-y-1/2 muted-2\" style=\"width:14px;height:14px\"><\u002Fi>\n            <input class=\"inp pl-8\" placeholder=\"ค้นหา...\" value=\"${escHtml(state.search||'')}\" oninput=\"state.search=this.value;renderView()\" style=\"width:220px;\">\n          <\u002Fdiv>\n          ${pending && st.hook ? `<button class=\"btn btn-soft\" onclick=\"syncAll('${id}')\"><i data-lucide=\"upload-cloud\"><\u002Fi> ส่งทั้งหมด<\u002Fbutton>`:''}\n          <details class=\"relative\">\n            <summary class=\"btn btn-ghost\"><i data-lucide=\"download\"><\u002Fi> ส่งออก <i data-lucide=\"chevron-down\"><\u002Fi><\u002Fsummary>\n            <div class=\"absolute right-0 top-full mt-1 card p-1 z-10 min-w-[160px]\" style=\"box-shadow:var(--shadow-pop)\">\n              <button class=\"nav-item w-full\" onclick=\"exportData('${id}','tsv')\"><i data-lucide=\"clipboard-copy\"><\u002Fi> TSV (Sheets)<\u002Fbutton>\n              <button class=\"nav-item w-full\" onclick=\"exportData('${id}','csv')\"><i data-lucide=\"file-text\"><\u002Fi> CSV<\u002Fbutton>\n              <button class=\"nav-item w-full\" onclick=\"exportData('${id}','json')\"><i data-lucide=\"braces\"><\u002Fi> JSON<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdetails>\n          <button class=\"btn btn-danger\" onclick=\"clearAllRecords('${id}')\"><i data-lucide=\"trash-2\"><\u002Fi><\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"card overflow-hidden\">\n        <div class=\"scroll-x\">\n          <table class=\"tbl\">\n            <thead>\n              <tr>\n                <th>วันที่<\u002Fth>\n                <th>ผู้บันทึก<\u002Fth>\n                <th class=\"text-right\">สุทธิ<\u002Fth>\n                <th class=\"text-right\">${def.saleType==='units'?'แก้ว':'เสิร์ฟ'}<\u002Fth>\n                ${def.saleType==='units' ? `<th class=\"text-right\">เย็น/ร้อน<\u002Fth>` : ''}\n                <th>เหลือ / หมด<\u002Fth>\n                <th>หมายเหตุ<\u002Fth>\n                <th class=\"text-center\">สถานะ<\u002Fth>\n                <th><\u002Fth>\n              <\u002Ftr>\n            <\u002Fthead>\n            <tbody>\n            ${filtered.length===0 ? `<tr><td colspan=\"9\" class=\"text-center muted py-10\">${q?'ไม่พบผลลัพธ์':'ยังไม่มีบันทึก'}<\u002Ftd><\u002Ftr>` :\n              filtered.map((r, idxR) => {\n                const realIdx = st.records.findIndex(x => x.ts === r.ts);\n                const left = (r.leftItems||[]).slice(0,3);\n                const out = (r.outItems||[]).slice(0,3);\n                return `<tr>\n                  <td><div class=\"font-semibold\">${fmtDate(r.dateISO||r.date)}<\u002Fdiv><div class=\"text-[11px] muted-2\">${r.dateISO||r.date}<\u002Fdiv><\u002Ftd>\n                  <td class=\"muted\">${escHtml(r.recorder||'—')}<\u002Ftd>\n                  <td class=\"text-right num font-semibold ${r.net<0?'text-[color:var(--neg)]':''}\">${fmtMoney(r.net)}<\u002Ftd>\n                  <td class=\"text-right num\">${fmt(r.total)}<\u002Ftd>\n                  ${def.saleType==='units' ? `<td class=\"text-right num text-[12px] muted\">${fmt(r.cold||0)} / ${fmt((r.hotG||0)+(r.hotB||0))}${r.hotB?` (${r.hotB}ถุง)`:''}<\u002Ftd>`:''}\n                  <td><div class=\"flex flex-wrap gap-1\">\n                    ${left.map(t=>`<span class=\"pill pill-warn\">${escHtml(t)}<\u002Fspan>`).join('')}\n                    ${out.map(t=>`<span class=\"pill pill-neg\">${escHtml(t)}<\u002Fspan>`).join('')}\n                    ${(r.leftItems||[]).length+ (r.outItems||[]).length > 3 ? `<span class=\"muted-2 text-[11px]\">+${(r.leftItems||[]).length+(r.outItems||[]).length-3}<\u002Fspan>`:''}\n                    ${(r.leftItems||[]).length+(r.outItems||[]).length===0?'<span class=\"muted-2 text-[12px]\">—<\u002Fspan>':''}\n                  <\u002Fdiv><\u002Ftd>\n                  <td class=\"muted text-[12px]\" style=\"max-width:200px\">${escHtml(r.note||'—')}<\u002Ftd>\n                  <td class=\"text-center\">\n                    ${r.synced ? '<span class=\"pill pill-pos\">synced<\u002Fspan>' : '<span class=\"pill pill-warn\">รอส่ง<\u002Fspan>'}\n                  <\u002Ftd>\n                  <td class=\"text-right whitespace-nowrap\">\n                    <button class=\"btn btn-icon\" onclick=\"syncRecord('${id}',${realIdx},this)\" title=\"ส่ง\"><i data-lucide=\"${r.synced?'refresh-cw':'upload'}\"><\u002Fi><\u002Fbutton>\n                    <button class=\"btn btn-icon\" onclick=\"editRecord('${id}',${realIdx})\" title=\"แก้ไข\"><i data-lucide=\"edit-3\"><\u002Fi><\u002Fbutton>\n                    <button class=\"btn btn-icon\" onclick=\"deleteRecord('${id}',${realIdx})\" title=\"ลบ\"><i data-lucide=\"trash-2\"><\u002Fi><\u002Fbutton>\n                  <\u002Ftd>\n                <\u002Ftr>`;\n              }).join('')\n            }\n            <\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `;\n}\n\nfunction editRecord(id, idx){\n  const st = state.stores[id];\n  const r = st.records[idx];\n  if(!r) return;\n  state.formDraft = {...r};\n  state.dynCosts = r.costsDyn ? deepCopy(r.costsDyn) : [];\n  state.invState = {}; state.invNotes = {};\n  (r.leftItems||[]).forEach(s=>{\n    const m = s.match(/^(.+?)\\s*\\((.+)\\)$/);\n    const n = m ? m[1].trim() : s.trim();\n    state.invState[n] = 'low';\n    if(m) state.invNotes[n] = m[2];\n  });\n  (r.outItems||[]).forEach(n => { state.invState[n.trim()] = 'out'; });\n  switchView('entry');\n}\n\nfunction deleteRecord(id, idx){\n  if(!confirm('ลบข้อมูลวันนี้?')) return;\n  const st = state.stores[id];\n  st.records.splice(idx,1);\n  LS.set(k(id,'records'), st.records);\n  reloadStore(id);\n  renderView();\n  toast('🗑 ลบแล้ว','in');\n}\nfunction clearAllRecords(id){\n  if(!confirm('ลบข้อมูลทั้งหมดของร้านนี้?')) return;\n  state.stores[id].records = [];\n  LS.set(k(id,'records'), []);\n  renderView();\n  toast('ล้างประวัติแล้ว','in');\n}\n\nfunction exportData(id, kind){\n  const st = state.stores[id];\n  const def = STORE_DEFS[id];\n  if(st.records.length===0){ toast('ไม่มีข้อมูล','er'); return; }\n  const flatRecs = st.records.map(r => buildPayload(id, r));\n  if(kind==='json'){\n    download(`${def.id}-${todayISO()}.json`, JSON.stringify({store:def.id, records:st.records, exported:new Date().toISOString()}, null, 2), 'application/json');\n  } else {\n    const keys = Array.from(new Set(flatRecs.flatMap(r=>Object.keys(r))));\n    const lines = [keys.join(kind==='csv'?',':'\\t')];\n    flatRecs.forEach(r => {\n      lines.push(keys.map(k => {\n        let v = r[k] ?? '';\n        v = String(v).replace(/\\n/g,' ');\n        if(kind==='csv' && /[,\"\\n]/.test(v)) v = '\"'+v.replace(/\"/g,'\"\"')+'\"';\n        return v;\n      }).join(kind==='csv'?',':'\\t'));\n    });\n    const content = lines.join('\\n');\n    if(kind==='tsv'){\n      navigator.clipboard.writeText(content).then(()=>toast('คัดลอก TSV แล้ว — ไปวางใน Google Sheets','ok'), ()=>toast('คัดลอกไม่ได้','er'));\n    } else {\n      download(`${def.id}-${todayISO()}.csv`, content, 'text/csv');\n    }\n  }\n}\nfunction download(name, content, mime){\n  const blob = new Blob([content], {type: mime});\n  const url = URL.createObjectURL(blob);\n  const a = document.createElement('a'); a.href = url; a.download = name; a.click();\n  setTimeout(()=>URL.revokeObjectURL(url), 1000);\n}\n<\u002Fscript>\n\n<!-- ============================================================== -->\n<!-- VIEW: STOCK                                                     -->\n<!-- ============================================================== -->\n<script>\nfunction renderStock(root){\n  const id = state.activeStore;\n  const def = STORE_DEFS[id];\n  const st = state.stores[id];\n\n  // Tally across all records\n  const counts = {};\n  st.records.forEach(r => {\n    (r.leftItems||[]).forEach(s => {\n      const m = s.match(/^(.+?)\\s*\\((.+)\\)$/);\n      const n = m ? m[1].trim() : s.trim();\n      counts[n] = counts[n]||{name:n, low:0, out:0, lastLow:null, lastOut:null};\n      counts[n].low++;\n      if(!counts[n].lastLow || r.dateISO > counts[n].lastLow) counts[n].lastLow = r.dateISO;\n    });\n    (r.outItems||[]).forEach(n => {\n      counts[n] = counts[n]||{name:n, low:0, out:0, lastLow:null, lastOut:null};\n      counts[n].out++;\n      if(!counts[n].lastOut || r.dateISO > counts[n].lastOut) counts[n].lastOut = r.dateISO;\n    });\n  });\n  const list = Object.values(counts).sort((a,b)=>(b.out*3+b.low) - (a.out*3+a.low));\n\n  // Catalog items not currently tracked\n  const allItems = st.catalog.flatMap(s=>s.items);\n  const tracked = new Set(Object.keys(counts));\n  const calm = allItems.filter(n => !tracked.has(n));\n\n  root.innerHTML = `\n    <div class=\"flex flex-col gap-4 max-w-[1100px]\">\n      <div class=\"grid grid-cols-1 md:grid-cols-3 gap-3\">\n        ${kpiCard('รายการในแคตตาล็อก', fmt(allItems.length), `${st.catalog.length} หมวด`, 'flat', 'package')}\n        ${kpiCard('เคยหมด', fmt(Object.values(counts).filter(c=>c.out>0).length), `จาก ${st.records.length} วัน`, 'neg', 'x-circle')}\n        ${kpiCard('เคยเหลือ', fmt(Object.values(counts).filter(c=>c.low>0).length), 'ครั้งล่าสุดติดตามรายการ', 'warn', 'alert-triangle')}\n      <\u002Fdiv>\n\n      <div class=\"card p-5\">\n        <div class=\"flex items-center justify-between mb-4\">\n          <div>\n            <div class=\"font-semibold text-[15px]\">รายการที่ต้องจับตา<\u002Fdiv>\n            <div class=\"text-[12px] muted\">รวมจากบันทึกทั้งหมด · เรียงตามถี่หมด+เหลือ<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        ${list.length===0 ? '<div class=\"muted text-center py-8\">ยังไม่มีรายการที่ต้องจับตา ✨<\u002Fdiv>' : `\n        <div class=\"overflow-hidden border hairline rounded-xl\">\n          <table class=\"tbl\">\n            <thead>\n              <tr><th>รายการ<\u002Fth><th class=\"text-right\">หมด<\u002Fth><th class=\"text-right\">เหลือ<\u002Fth><th>ล่าสุด<\u002Fth><th>ความถี่<\u002Fth><\u002Ftr>\n            <\u002Fthead>\n            <tbody>\n              ${list.map(c => {\n                const maxBar = Math.max(...list.map(x=>x.out*3+x.low));\n                const w = Math.round((c.out*3+c.low)/maxBar*100);\n                return `<tr>\n                  <td class=\"font-medium\">${escHtml(c.name)}<\u002Ftd>\n                  <td class=\"text-right num\">${c.out?`<span class=\"pill pill-neg\">${c.out}×<\u002Fspan>`:'—'}<\u002Ftd>\n                  <td class=\"text-right num\">${c.low?`<span class=\"pill pill-warn\">${c.low}×<\u002Fspan>`:'—'}<\u002Ftd>\n                  <td class=\"muted text-[12px]\">${c.lastOut?'หมด '+fmtDate(c.lastOut):c.lastLow?'เหลือ '+fmtDate(c.lastLow):'—'}<\u002Ftd>\n                  <td><div class=\"h-1.5 rounded-full surface-2 overflow-hidden\" style=\"min-width:120px;\"><div class=\"h-full bg-accent\" style=\"width:${w}%\"><\u002Fdiv><\u002Fdiv><\u002Ftd>\n                <\u002Ftr>`;\n              }).join('')}\n            <\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>`}\n      <\u002Fdiv>\n\n      <div class=\"card p-5\">\n        <div class=\"font-semibold text-[15px] mb-3\">ไม่เคยเป็นปัญหา <span class=\"muted text-[12px] font-normal\">· ${calm.length} รายการ<\u002Fspan><\u002Fdiv>\n        <div class=\"flex flex-wrap gap-1.5\">\n          ${calm.length===0?'<span class=\"muted text-[13px]\">—<\u002Fspan>':calm.map(n=>`<span class=\"pill\">${escHtml(n)}<\u002Fspan>`).join('')}\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `;\n}\n<\u002Fscript>\n\n<!-- ============================================================== -->\n<!-- VIEW: ADMIN                                                     -->\n<!-- ============================================================== -->\n<script>\nfunction renderAdmin(root){\n  const id = state.activeStore;\n  const def = STORE_DEFS[id];\n  const st = state.stores[id];\n\n  root.innerHTML = `\n    <div class=\"max-w-[1000px] flex flex-col gap-4\">\n\n      <!-- KPI Target -->\n      <div class=\"card p-5\">\n        <div class=\"flex items-center gap-2 mb-3\">\n          <i data-lucide=\"target\"><\u002Fi>\n          <span class=\"font-semibold text-[14.5px]\">เป้ายอดสุทธิรายเดือน<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"flex items-center gap-3\">\n          <span class=\"muted text-[13px]\">฿<\u002Fspan>\n          <input class=\"inp num\" id=\"adm_target\" type=\"number\" min=\"0\" value=\"${st.target}\" style=\"max-width:200px\">\n          <button class=\"btn btn-primary\" onclick=\"saveTarget()\"><i data-lucide=\"check\"><\u002Fi> บันทึก<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"text-[12px] muted mt-2\">ใช้เป็นเปอร์เซ็นต์ในแดชบอร์ด<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Field editors -->\n      ${fieldEditor(id, 'basic', 'ข้อมูลพื้นฐาน', 'list')}\n      ${fieldEditor(id, 'sale',  def.saleType==='units'?'ยอดขาย (เงินสด + แก้ว)':'ยอดขาย', 'trending-up')}\n      ${st.cost.length || !def.hasDynCosts ? fieldEditor(id, 'cost', 'ค่าใช้จ่ายคงที่', 'minus-circle') : ''}\n      ${def.hasBoxEgg ? fieldEditor(id, 'boxegg', 'กล่อง / ไข่', 'boxes') : ''}\n\n      <!-- Catalog editor -->\n      <div class=\"card p-5\">\n        <div class=\"flex items-center justify-between mb-3\">\n          <div class=\"flex items-center gap-2\">\n            <i data-lucide=\"package-2\"><\u002Fi>\n            <span class=\"font-semibold text-[14.5px]\">แคตตาล็อกสต็อก<\u002Fspan>\n          <\u002Fdiv>\n          <button class=\"btn btn-ghost\" onclick=\"addCat('${id}')\"><i data-lucide=\"plus\"><\u002Fi> เพิ่มหมวด<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"flex flex-col gap-4\">\n          ${st.catalog.map((sec,ci) => `\n            <div class=\"border hairline rounded-xl p-3\">\n              <div class=\"flex items-center gap-2 mb-2\">\n                <input class=\"inp\" value=\"${escHtml(sec.cat)}\" onchange=\"state.stores['${id}'].catalog[${ci}].cat=this.value;saveField('${id}','catalog',state.stores['${id}'].catalog)\" style=\"font-weight:600;max-width:360px;\">\n                <button class=\"btn btn-icon btn-danger\" onclick=\"delCat('${id}',${ci})\"><i data-lucide=\"trash-2\"><\u002Fi><\u002Fbutton>\n              <\u002Fdiv>\n              <div class=\"flex flex-wrap gap-1.5 mb-2\">\n                ${sec.items.map((it,ii)=>`<span class=\"pill\" style=\"padding:4px 9px;\">${escHtml(it)}<button class=\"ml-1.5 muted-2 hover:text-[color:var(--neg)]\" onclick=\"state.stores['${id}'].catalog[${ci}].items.splice(${ii},1);saveField('${id}','catalog',state.stores['${id}'].catalog);renderView()\"><i data-lucide=\"x\" style=\"width:11px;height:11px\"><\u002Fi><\u002Fbutton><\u002Fspan>`).join('')}\n              <\u002Fdiv>\n              <div class=\"flex gap-2\">\n                <input class=\"inp\" placeholder=\"เพิ่มรายการใหม่...\" style=\"font-size:13px\" id=\"add_it_${ci}\" onkeydown=\"if(event.key==='Enter') addCatItem('${id}',${ci})\">\n                <button class=\"btn btn-soft\" onclick=\"addCatItem('${id}',${ci})\"><i data-lucide=\"plus\"><\u002Fi><\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          `).join('')}\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Reset -->\n      <div class=\"card p-5 border-dashed\" style=\"border-style:dashed\">\n        <div class=\"font-semibold text-[14.5px] mb-2\">รีเซ็ตค่าเริ่มต้น<\u002Fdiv>\n        <div class=\"text-[12.5px] muted mb-3\">คืนสคีมาและแคตตาล็อกของร้านนี้กลับเป็นค่าจากโรงงาน (จะไม่ลบข้อมูลที่บันทึกไว้)<\u002Fdiv>\n        <button class=\"btn btn-danger\" onclick=\"resetStoreDefaults('${id}')\"><i data-lucide=\"rotate-ccw\"><\u002Fi> รีเซ็ตสคีมา + แคตตาล็อก<\u002Fbutton>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  `;\n}\n\nfunction fieldEditor(id, kind, label, icon){\n  const st = state.stores[id];\n  const fields = st[kind];\n  const labels = { basic:'data', sale:'data', cost:'data', boxegg:'data' };\n  return `<div class=\"card p-5\">\n    <div class=\"flex items-center justify-between mb-3\">\n      <div class=\"flex items-center gap-2\">\n        <i data-lucide=\"${icon}\"><\u002Fi>\n        <span class=\"font-semibold text-[14.5px]\">${label}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"flex flex-col\">\n      ${fields.map((f,i) => `<div class=\"flex items-center gap-2 py-2 border-b hairline last:border-b-0\">\n        <i data-lucide=\"grip-vertical\" class=\"muted-2 cursor-grab\"><\u002Fi>\n        <input class=\"inp\" style=\"font-size:13.5px;flex:1\" value=\"${escHtml(f.label)}\" onchange=\"state.stores['${id}'].${kind}[${i}].label=this.value;saveField('${id}','${kind}',state.stores['${id}'].${kind})\" ${f.fixed?'disabled':''}>\n        ${'role' in f ? `<select class=\"inp\" style=\"font-size:12px;max-width:120px\" onchange=\"state.stores['${id}'].${kind}[${i}].role=this.value;saveField('${id}','${kind}',state.stores['${id}'].${kind})\">\n          ${['plus','minus','count','unit','none'].map(r=>`<option value=\"${r}\" ${f.role===r?'selected':''}>${r==='plus'?'+ บวก':r==='minus'?'− ลบ':r==='unit'?'#หน่วย':r==='count'?'#นับ':'ไม่นับ'}<\u002Foption>`).join('')}\n        <\u002Fselect>` : ''}\n        <span class=\"pill\" style=\"font-size:10.5px;padding:1px 7px\">${f.type||'number'}<\u002Fspan>\n        ${f.fixed?'<span class=\"pill pill-accent\" style=\"font-size:10.5px;padding:1px 7px\">ระบบ<\u002Fspan>':''}\n        ${f.req?'<span class=\"pill pill-neg\" style=\"font-size:10.5px;padding:1px 7px\">จำเป็น<\u002Fspan>':''}\n        ${!f.fixed?`<button class=\"btn btn-icon btn-danger\" onclick=\"delField('${id}','${kind}',${i})\"><i data-lucide=\"trash-2\"><\u002Fi><\u002Fbutton>`:''}\n      <\u002Fdiv>`).join('')}\n    <\u002Fdiv>\n    <div class=\"flex gap-2 mt-3 pt-3 border-t hairline\">\n      <input class=\"inp\" style=\"flex:1;font-size:13px\" placeholder=\"เพิ่มฟิลด์ใหม่...\" id=\"add_${kind}_inp\" onkeydown=\"if(event.key==='Enter') addField('${id}','${kind}')\">\n      <button class=\"btn btn-soft\" onclick=\"addField('${id}','${kind}')\"><i data-lucide=\"plus\"><\u002Fi> เพิ่ม<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction addField(id, kind){\n  const inp = document.getElementById('add_'+kind+'_inp');\n  const v = inp.value.trim(); if(!v) return;\n  const st = state.stores[id];\n  const newF = { id: uid(), key: v.toLowerCase().replace(/\\s+/g,'_'), label: v, type: kind==='basic'?'text':'number', ph:'0', fixed:false, req:false };\n  if(kind==='sale') newF.role='count';\n  st[kind].push(newF);\n  saveField(id, kind, st[kind]);\n  renderView();\n  toast('✅ เพิ่ม \"'+v+'\"','ok');\n}\nfunction delField(id, kind, i){\n  if(!confirm('ลบฟิลด์นี้?')) return;\n  state.stores[id][kind].splice(i,1);\n  saveField(id, kind, state.stores[id][kind]);\n  renderView();\n}\nfunction addCat(id){\n  const v = prompt('ชื่อหมวดใหม่:'); if(!v) return;\n  state.stores[id].catalog.push({cat:v, items:[]});\n  saveField(id,'catalog', state.stores[id].catalog);\n  renderView();\n}\nfunction delCat(id, i){\n  if(!confirm('ลบหมวดนี้?')) return;\n  state.stores[id].catalog.splice(i,1);\n  saveField(id,'catalog', state.stores[id].catalog);\n  renderView();\n}\nfunction addCatItem(id, ci){\n  const inp = document.getElementById('add_it_'+ci);\n  const v = inp.value.trim(); if(!v) return;\n  state.stores[id].catalog[ci].items.push(v);\n  saveField(id,'catalog', state.stores[id].catalog);\n  renderView();\n}\nfunction saveTarget(){\n  const v = +document.getElementById('adm_target').value || 0;\n  saveField(state.activeStore,'target', v);\n  state.stores[state.activeStore].target = v;\n  toast('✅ บันทึกเป้าแล้ว','ok');\n}\nfunction resetStoreDefaults(id){\n  if(!confirm('คืนค่าสคีมาและแคตตาล็อกของร้านนี้?')) return;\n  const def = STORE_DEFS[id];\n  ['basic','sale','cost','catalog'].forEach(kind=>{\n    const key = 'default'+kind.charAt(0).toUpperCase()+kind.slice(1);\n    if(def[key]) saveField(id, kind, deepCopy(def[key]));\n  });\n  if(def.hasBoxEgg) saveField(id,'boxegg', deepCopy(def.defaultBoxEgg));\n  reloadStore(id);\n  renderView();\n  toast('✅ รีเซ็ตสคีมาแล้ว','ok');\n}\n<\u002Fscript>\n\n<!-- ============================================================== -->\n<!-- VIEW: SETTINGS                                                  -->\n<!-- ============================================================== -->\n<script>\nfunction renderSettings(root){\n  const samplePayload = state.stores[state.activeStore].records[0]\n    ? buildPayload(state.activeStore, state.stores[state.activeStore].records[0])\n    : buildSamplePayload(state.activeStore);\n\n  root.innerHTML = `\n    <div class=\"max-w-[920px] flex flex-col gap-4\">\n\n      <!-- Webhooks -->\n      <div class=\"card p-5\">\n        <div class=\"flex items-center gap-2 mb-1\">\n          <i data-lucide=\"link-2\"><\u002Fi>\n          <span class=\"font-semibold text-[15px]\">Make.com webhook (ต่อร้าน)<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"text-[12.5px] muted mb-4\">วาง URL ของ webhook ที่ได้จาก Make.com แต่ละ scenario · payload จะส่งเป็น JSON พร้อม <code class=\"mono\">lineMessage<\u002Fcode> สำหรับ HTTP module เชื่อม LINE Messaging API<\u002Fdiv>\n        <div class=\"flex flex-col gap-3\">\n        ${STORE_IDS.map(id => {\n          const d = STORE_DEFS[id];\n          const s = state.stores[id];\n          const ok = !!s.hook;\n          return `<div class=\"border hairline rounded-xl p-3\">\n            <div class=\"flex items-center gap-2 mb-2\">\n              <span class=\"w-7 h-7 rounded-md flex items-center justify-center\" style=\"background:oklch(95% 0.04 ${d.accentHue})\">${d.badge}<\u002Fspan>\n              <div class=\"flex-1 font-semibold text-[13.5px]\">${escHtml(d.name)}<\u002Fdiv>\n              ${ok?'<span class=\"pill pill-pos\">เชื่อมต่อแล้ว<\u002Fspan>':'<span class=\"pill pill-warn\">ยังไม่ได้ตั้งค่า<\u002Fspan>'}\n            <\u002Fdiv>\n            <div class=\"flex gap-2 flex-wrap\">\n              <input class=\"inp mono\" id=\"hook_${id}\" placeholder=\"https://hook.eu1.make.com/...\" value=\"${escHtml(s.hook)}\" style=\"flex:1;min-width:240px;font-size:12.5px\">\n              <button class=\"btn btn-ghost\" onclick=\"testHook('${id}')\"><i data-lucide=\"zap\"><\u002Fi> ทดสอบ<\u002Fbutton>\n              <button class=\"btn btn-primary\" onclick=\"saveHook('${id}')\"><i data-lucide=\"save\"><\u002Fi> บันทึก<\u002Fbutton>\n            <\u002Fdiv>\n            <div class=\"text-[11.5px] muted-2 mt-1\" id=\"hook_status_${id}\"><\u002Fdiv>\n          <\u002Fdiv>`;\n        }).join('')}\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Theme -->\n      <div class=\"card p-5\">\n        <div class=\"flex items-center gap-2 mb-3\">\n          <i data-lucide=\"palette\"><\u002Fi>\n          <span class=\"font-semibold text-[14.5px]\">ธีม<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"grid grid-cols-1 md:grid-cols-2 gap-4\">\n          <div>\n            <div class=\"text-[12.5px] muted mb-2\">โหมด<\u002Fdiv>\n            <div class=\"flex gap-2\">\n              ${['light','dark'].map(m=>`<button class=\"btn ${state.theme===m?'btn-primary':'btn-ghost'}\" onclick=\"setTheme('${m}')\"><i data-lucide=\"${m==='light'?'sun':'moon'}\"><\u002Fi> ${m==='light'?'สว่าง':'มืด'}<\u002Fbutton>`).join('')}\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div class=\"text-[12.5px] muted mb-2\">สี accent (ต่อร้าน)<\u002Fdiv>\n            <div class=\"flex flex-col gap-2\">\n              ${STORE_IDS.map(id=>{\n                const d = STORE_DEFS[id];\n                const cur = state.stores[id].accentHue;\n                return `<div class=\"flex items-center gap-3\">\n                  <span class=\"text-[12.5px] w-20 truncate\">${d.badge} ${escHtml(d.shortName)}<\u002Fspan>\n                  <div class=\"flex gap-1.5 flex-wrap\">\n                  ${[245,200,160,140,55,25,0,330,290].map(h => `<button class=\"w-6 h-6 rounded-full transition-all ${cur===h?'ring-2 ring-offset-2 ring-offset-[color:var(--bg)]':''}\" style=\"background:oklch(${state.theme==='dark'?72:60}% 0.16 ${h});\" onclick=\"setAccentHue('${id}', ${h})\"><\u002Fbutton>`).join('')}\n                  <\u002Fdiv>\n                <\u002Fdiv>`;\n              }).join('')}\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Payload preview -->\n      <div class=\"card p-5\">\n        <div class=\"flex items-center gap-2 mb-2\">\n          <i data-lucide=\"code-2\"><\u002Fi>\n          <span class=\"font-semibold text-[14.5px]\">Sample payload (${escHtml(STORE_DEFS[state.activeStore].name)})<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"text-[12.5px] muted mb-3\">รูปแบบ JSON ที่ส่งไป Make.com — ใช้ Map keys ตามนี้<\u002Fdiv>\n        <pre class=\"mono text-[11.5px] p-3 rounded-lg surface-2 overflow-x-auto\" style=\"max-height:340px;white-space:pre-wrap;word-break:break-word;\">${escHtml(JSON.stringify(samplePayload, null, 2))}<\u002Fpre>\n      <\u002Fdiv>\n\n      <!-- Backup -->\n      <div class=\"card p-5\">\n        <div class=\"flex items-center gap-2 mb-3\">\n          <i data-lucide=\"database\"><\u002Fi>\n          <span class=\"font-semibold text-[14.5px]\">สำรอง / กู้คืน ข้อมูล<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"flex gap-2 flex-wrap\">\n          <button class=\"btn btn-ghost\" onclick=\"backupAll()\"><i data-lucide=\"download\"><\u002Fi> ดาวน์โหลดทั้งหมด (JSON)<\u002Fbutton>\n          <label class=\"btn btn-ghost cursor-pointer\"><i data-lucide=\"upload\"><\u002Fi> นำเข้า JSON\n            <input type=\"file\" accept=\"application/json\" hidden onchange=\"importBackup(event)\">\n          <\u002Flabel>\n          <button class=\"btn btn-danger\" onclick=\"wipeAll()\"><i data-lucide=\"trash-2\"><\u002Fi> ลบทุกอย่างในเครื่อง<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"text-[11.5px] muted-2 mt-3\">ข้อมูลทั้งหมดเก็บใน localStorage บนเครื่องนี้เท่านั้น<\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  `;\n}\n\nfunction buildSamplePayload(id){\n  const def = STORE_DEFS[id];\n  const st = state.stores[id];\n  const sample = { date: todayISO(), dateISO: todayISO(), recorder:'ตัวอย่าง', note:'' };\n  [...st.basic, ...st.sale, ...st.cost, ...(def.hasBoxEgg?st.boxegg:[])].forEach(f => {\n    sample[f.key] = f.type==='date' ? todayISO() : (f.type==='text' ? '' : 0);\n  });\n  if(def.hasDynCosts) sample.costsDyn = [{amt:50,desc:'ทิชชู่'}];\n  sample.net = 0; sample.total = 0; sample.leftItems=[]; sample.outItems=[];\n  return buildPayload(id, sample);\n}\n\nfunction saveHook(id){\n  const v = document.getElementById('hook_'+id).value.trim();\n  saveField(id, 'hook', v);\n  state.stores[id].hook = v;\n  toast('✅ บันทึก webhook แล้ว','ok');\n  renderShell();\n  lucide.createIcons();\n}\nasync function testHook(id){\n  const v = document.getElementById('hook_'+id).value.trim();\n  if(!v){ toast('ใส่ URL ก่อน','er'); return; }\n  const st = document.getElementById('hook_status_'+id);\n  st.innerHTML = '<span class=\"spin\"><\u002Fspan> กำลังทดสอบ...';\n  try{\n    await fetch(v, {method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'}, body:JSON.stringify({test:true, message:'ทดสอบจาก yy. console', store:id, timestamp:new Date().toISOString()})});\n    st.innerHTML = '<span style=\"color:var(--pos)\">✓ ส่งทดสอบแล้ว — ตรวจที่ Make.com<\u002Fspan>';\n  }catch(e){\n    st.innerHTML = '<span style=\"color:var(--neg)\">✕ ส่งไม่ได้: '+e.message+'<\u002Fspan>';\n  }\n}\nfunction setTheme(t){\n  state.theme = t;\n  LS.set('yy.theme', t);\n  applyTheme();\n  applyAccent();\n  renderView();\n}\nfunction setAccentHue(id, h){\n  saveField(id,'accentHue', h);\n  state.stores[id].accentHue = h;\n  if(id===state.activeStore) applyAccent();\n  renderShell();\n  renderView();\n  lucide.createIcons();\n}\nfunction backupAll(){\n  const data = { exported:new Date().toISOString(), stores:{} };\n  STORE_IDS.forEach(id => data.stores[id] = getStoreState(id));\n  download(`yy-backup-${todayISO()}.json`, JSON.stringify(data, null, 2), 'application/json');\n}\nfunction importBackup(e){\n  const f = e.target.files[0]; if(!f) return;\n  const r = new FileReader();\n  r.onload = ev => {\n    try{\n      const d = JSON.parse(ev.target.result);\n      if(!d.stores){ toast('ไฟล์ไม่ถูกต้อง','er'); return; }\n      if(!confirm('นำเข้าจะเขียนทับข้อมูลเดิม — ทำต่อหรือไม่?')) return;\n      STORE_IDS.forEach(id => {\n        if(!d.stores[id]) return;\n        ['basic','sale','cost','boxegg','catalog','records','hook','target','accentHue'].forEach(kk=>{\n          if(d.stores[id][kk] !== undefined) saveField(id,kk, d.stores[id][kk]);\n        });\n      });\n      loadAllStores();\n      renderView();\n      toast('✅ นำเข้าสำเร็จ','ok');\n    } catch(err){ toast('JSON ไม่ถูกต้อง: '+err.message,'er'); }\n  };\n  r.readAsText(f);\n}\nfunction wipeAll(){\n  if(!confirm('ลบข้อมูลทั้งหมดในเครื่อง?')) return;\n  if(!confirm('แน่ใจ? ไม่สามารถย้อนได้')) return;\n  Object.keys(localStorage).filter(k=>k.startsWith('yy.')).forEach(k=>localStorage.removeItem(k));\n  location.reload();\n}\n<\u002Fscript>\n\n<!-- ============================================================== -->\n<!-- DEMO SEED + BOOTSTRAP                                           -->\n<!-- ============================================================== -->\n<script>\nfunction seedDemo(){\n  if(LS.get('yy.seeded')) return;\n  // Only seed if ALL 3 stores empty\n  const anyData = STORE_IDS.some(id => (LS.get(k(id,'records'))||[]).length > 0);\n  if(anyData){ LS.set('yy.seeded', 1); return; }\n  STORE_IDS.forEach(id => {\n    const def = STORE_DEFS[id];\n    const recs = [];\n    const baseTarget = def.defaultTarget / 30;\n    for(let i=0; i<30; i++){\n      const d = new Date(); d.setDate(d.getDate()-(29-i));\n      const dateISO = d.toISOString().split('T')[0];\n      const variance = 0.6 + Math.random()*0.9; // 0.6× to 1.5×\n      const weekend = (d.getDay()===0 || d.getDay()===6) ? 1.25 : 1.0;\n      const net = Math.round(baseTarget * variance * weekend);\n      const rec = { dateISO, date: dateISO, recorder: ['ฝน','ก้อง','พี่บิ๊ก'][i%3], note:'', ts: d.getTime(), synced: Math.random()>0.2 };\n      // Populate sale fields\n      if(def.saleType==='units'){\n        const cold = Math.round(40 + variance*60 * weekend);\n        const hotG = Math.round(15 + variance*20);\n        const hotB = Math.round(Math.random()*4);\n        rec.cold = cold; rec.hotG = hotG; rec.hotB = hotB; rec.bottle = Math.round(Math.random()*8);\n        rec.float = 500; rec.cashIn = Math.max(0, net + 500 + Math.round(120 + Math.random()*120));\n        rec.ice = 160 + (Math.random()>0.5 ? 80 : 0);\n        rec.costsDyn = Math.random()>0.7 ? [{amt: 80+Math.round(Math.random()*120), desc:'ทิชชู่'}] : [];\n        rec.total = cold + hotG + hotB;\n        rec.net = rec.cashIn - rec.float - rec.ice - (rec.costsDyn[0]?.amt||0);\n      } else {\n        rec.float = 1000;\n        rec.cashIn = Math.max(0, net + 1000 + Math.round(180 + Math.random()*200));\n        if(id==='pussorn'){\n          rec.water = 30 + Math.round(Math.random()*30);\n          rec.ice = 70 + Math.round(Math.random()*40);\n          rec.otherCost = Math.random()>0.6 ? Math.round(Math.random()*100) : 0;\n          rec.orders = Math.round(20 + variance*30 * weekend);\n        } else { // khaow\n          rec.ice = 60 + Math.round(Math.random()*40);\n          rec.gas = Math.random()>0.85 ? 350 : 0;\n          rec.otherCost = Math.random()>0.7 ? Math.round(Math.random()*80) : 0;\n          rec.servings = Math.round(30 + variance*25 * weekend);\n          rec.servingsHalf = Math.round(Math.random()*8);\n          rec.boxesLeft = Math.round(Math.random()*15);\n          rec.startBoxes = 100; rec.endBoxes = 100 - Math.round(15+Math.random()*30);\n          rec.startEggs = 200; rec.endEggs = 200 - Math.round(40+Math.random()*60);\n        }\n        rec.total = rec.cashIn - rec.float;\n        const costSum = (rec.water||0)+(rec.ice||0)+(rec.gas||0)+(rec.otherCost||0);\n        rec.net = rec.cashIn - rec.float - costSum;\n      }\n      // Random inv low/out (~25% of days have items)\n      const cat = def.defaultCatalog;\n      const left=[], out=[];\n      if(Math.random()>0.6){\n        const sec = cat[Math.floor(Math.random()*cat.length)];\n        const n = sec.items[Math.floor(Math.random()*sec.items.length)];\n        if(Math.random()>0.4) left.push(n+(Math.random()>0.5?` (เหลือ ${Math.ceil(Math.random()*3)})`:''));\n        else out.push(n);\n      }\n      if(Math.random()>0.85){\n        const sec = cat[Math.floor(Math.random()*cat.length)];\n        const n = sec.items[Math.floor(Math.random()*sec.items.length)];\n        if(!left.includes(n) && !out.includes(n)) out.push(n);\n      }\n      rec.leftItems = left;\n      rec.outItems = out;\n      recs.push(rec);\n    }\n    LS.set(k(id,'records'), recs);\n  });\n  LS.set('yy.seeded', 1);\n}\n\n/* --------- CMD palette --------- */\nfunction openCmd(){\n  document.getElementById('cmd_modal').classList.add('show');\n  setTimeout(()=>{\n    document.getElementById('cmd_inp').focus();\n    renderCmdResults('');\n  }, 50);\n}\nfunction closeCmd(){ document.getElementById('cmd_modal').classList.remove('show'); }\nfunction renderCmdResults(q){\n  const items = [\n    ...STORE_IDS.map(id => ({type:'store', label: STORE_DEFS[id].badge+' '+STORE_DEFS[id].name, action:()=>{switchStore(id); closeCmd();}})),\n    ...VIEWS.map(v => ({type:'view', label: '→ '+v.th, action:()=>{switchView(v.id); closeCmd();}}))\n  ];\n  const f = q ? items.filter(i => i.label.toLowerCase().includes(q.toLowerCase())) : items;\n  document.getElementById('cmd_results').innerHTML = f.map((it,i)=>`<button class=\"nav-item w-full\" data-cmd=\"${i}\"><span class=\"text-[10px] muted-2 uppercase\">${it.type}<\u002Fspan><span>${it.label}<\u002Fspan><\u002Fbutton>`).join('');\n  document.querySelectorAll('#cmd_results button').forEach((b,i)=>b.onclick = f[i].action);\n}\ndocument.addEventListener('keydown', e => {\n  if((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==='k'){ e.preventDefault(); openCmd(); }\n  if(e.key==='Escape') closeCmd();\n});\ndocument.getElementById('cmd_modal').addEventListener('click', e=>{ if(e.target.id==='cmd_modal') closeCmd(); });\n\n/* --------- BOOT --------- */\ndocument.getElementById('theme_toggle').addEventListener('click', ()=>{\n  state.theme = state.theme==='light'?'dark':'light';\n  LS.set('yy.theme', state.theme);\n  applyTheme(); applyAccent();\n  renderView(); renderShell();\n});\ndocument.getElementById('cmd_inp')?.addEventListener('input', e => renderCmdResults(e.target.value));\n\n(function boot(){\n  applyTheme();\n  seedDemo();\n  loadAllStores();\n  applyAccent();\n  // Restore last view\n  state.view = LS.get('yy.lastView.'+state.activeStore) || 'dashboard';\n  renderShell();\n  renderView();\n  lucide.createIcons();\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
