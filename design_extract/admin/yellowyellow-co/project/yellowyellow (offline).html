  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

space;\n  }\n<\u002Fstyle>\n<script src=\"c53cd45b-d53c-40a4-953f-c2dd579ef1c0\"><\u002Fscript>\n<script src=\"536121f9-c7aa-45a1-b0c9-ae7b22127081\"><\u002Fscript>\n<style>\n  :root{\n    --bg: #fafaf9;\n    --surface: #ffffff;\n    --surface-2: #f5f5f4;\n    --border: #e7e5e4;\n    --border-strong: #d6d3d1;\n    --text: #1c1917;\n    --text-2: #57534e;\n    --text-3: #a8a29e;\n    --accent: oklch(60% 0.16 245);\n    --accent-soft: oklch(95% 0.04 245);\n    --accent-ink: oklch(40% 0.18 245);\n    --pos: oklch(58% 0.15 155);\n    --neg: oklch(58% 0.20 25);\n    --warn: oklch(72% 0.16 70);\n    --shadow-card: 0 1px 0 0 rgba(0,0,0,.02), 0 1px 3px 0 rgba(0,0,0,.04);\n    --shadow-pop: 0 12px 32px -8px rgba(0,0,0,.16), 0 4px 12px -4px rgba(0,0,0,.06);\n  }\n  .dark{\n    --bg: #0a0a0a;\n    --surface: #111111;\n    --surface-2: #181818;\n    --border: #232323;\n    --border-strong: #2e2e2e;\n    --text: #f5f5f4;\n    --text-2: #a8a29e;\n    --text-3: #57534e;\n    --accent: oklch(72% 0.15 245);\n    --accent-soft: oklch(28% 0.07 245);\n    --accent-ink: oklch(85% 0.10 245);\n    --shadow-card: 0 1px 0 0 rgba(255,255,255,.02), 0 1px 3px 0 rgba(0,0,0,.4);\n    --shadow-pop: 0 12px 32px -8px rgba(0,0,0,.6);\n  }\n  html,body{background:var(--bg);color:var(--text);}\n  body{font-family:'Sarabun',ui-sans-serif,system-ui,sans-serif;font-feature-settings:\"ss01\",\"cv11\";}\n  /* Thai script doesn't have natural word boundaries — keep-all prevents mid-word breaks. */\n  h1, h2, h3, h4, .pkpi-eyebrow, .lbl, .nav-item { word-break: keep-all; }\n  .pill, .ic-chip { white-space: nowrap; word-break: keep-all; }\n  .num{font-variant-numeric:tabular-nums;letter-spacing:-.01em;}\n  .mono{font-family:'JetBrains Mono',ui-monospace,monospace;}\n  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-card);}\n  .card-flat{background:var(--surface);border:1px solid var(--border);border-radius:14px;}\n  .hairline{border-color:var(--border);}\n  .hairline-strong{border-color:var(--border-strong);}\n  .muted{color:var(--text-2);}\n  .muted-2{color:var(--text-3);}\n  .surface-2{background:var(--surface-2);}\n  .accent{color:var(--accent);}\n  .bg-accent{background:var(--accent);}\n  .bg-accent-soft{background:var(--accent-soft);}\n  .text-accent-ink{color:var(--accent-ink);}\n  .ring-accent{box-shadow:0 0 0 3px color-mix(in oklch, var(--accent) 22%, transparent);}\n  .border-accent{border-color:var(--accent);}\n\n  /* Inputs */\n  .inp{\n    width:100%;padding:9px 12px;border:1px solid var(--border-strong);border-radius:10px;\n    background:var(--surface);color:var(--text);font:inherit;font-size:14px;outline:none;\n    transition:border-color .12s, box-shadow .12s, background .12s;\n  }\n  .inp::placeholder{color:var(--text-3);}\n  .inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in oklch, var(--accent) 18%, transparent);}\n  .inp[type=\"date\"]{font-variant-numeric:tabular-nums;}\n  .lbl{font-size:12.5px;font-weight:600;color:var(--text-2);display:flex;align-items:center;gap:6px;}\n  .lbl .req{color:var(--neg);}\n  .lbl .sub{font-weight:400;color:var(--text-3);font-size:11.5px;}\n\n  /* Buttons */\n  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;border-radius:10px;font:inherit;font-size:13.5px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .12s;white-space:nowrap;line-height:1;}\n  .btn:disabled{opacity:.5;cursor:not-allowed;}\n  .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}\n  .btn-primary:hover:not(:disabled){filter:brightness(1.08);}\n  .btn-ghost{background:transparent;color:var(--text);border-color:var(--border-strong);}\n  .btn-ghost:hover{background:var(--surface-2);}\n  .btn-soft{background:var(--accent-soft);color:var(--accent-ink);}\n  .btn-soft:hover{filter:brightness(.97);}\n  .btn-danger{background:transparent;color:var(--neg);border:1px solid color-mix(in oklch, var(--neg) 35%, transparent);}\n  .btn-danger:hover{background:color-mix(in oklch, var(--neg) 10%, transparent);}\n  .btn-icon{width:34px;height:34px;padding:0;border-radius:10px;color:var(--text-2);}\n  .btn-icon:hover{background:var(--surface-2);color:var(--text);}\n\n  /* Nav */\n  .nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:9px;cursor:pointer;color:var(--text-2);font-weight:500;font-size:14px;transition:all .12s;white-space:nowrap;}\n  .nav-item:hover{background:var(--surface-2);color:var(--text);}\n  .nav-item.active{background:var(--accent-soft);color:var(--accent-ink);font-weight:600;}\n  .nav-item.active svg{color:var(--accent);}\n\n  /* Pill */\n  .pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--text-2);}\n  .pill-pos{color:oklch(45% 0.15 155);background:oklch(96% 0.04 155);border-color:oklch(85% 0.07 155);}\n  .pill-neg{color:oklch(45% 0.18 25);background:oklch(96% 0.04 25);border-color:oklch(85% 0.07 25);}\n  .pill-warn{color:oklch(45% 0.14 70);background:oklch(96% 0.04 70);border-color:oklch(85% 0.07 70);}\n  .pill-accent{color:var(--accent-ink);background:var(--accent-soft);border-color:color-mix(in oklch, var(--accent) 30%, transparent);}\n  .dark .pill-pos{color:oklch(80% 0.15 155);background:oklch(22% 0.06 155);border-color:oklch(30% 0.07 155);}\n  .dark .pill-neg{color:oklch(80% 0.15 25);background:oklch(22% 0.06 25);border-color:oklch(30% 0.07 25);}\n  .dark .pill-warn{color:oklch(85% 0.14 70);background:oklch(22% 0.06 70);border-color:oklch(30% 0.07 70);}\n\n  /* Inventory chip */\n  .ic-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:999px;font-size:13px;font-weight:500;cursor:pointer;user-select:none;border:1px solid var(--border-strong);background:var(--surface);color:var(--text);transition:all .14s ease;}\n  .ic-chip:hover{transform:translateY(-1px);box-shadow:var(--shadow-card);}\n  .ic-chip .dot{width:7px;height:7px;border-radius:999px;background:var(--text-3);}\n  .ic-chip.low{background:oklch(97% 0.05 75);border-color:oklch(70% 0.16 75);color:oklch(40% 0.14 70);}\n  .ic-chip.low .dot{background:oklch(70% 0.16 75);}\n  .ic-chip.out{background:oklch(96% 0.04 25);border-color:oklch(75% 0.16 25);color:oklch(45% 0.18 25);text-decoration:line-through;}\n  .ic-chip.out .dot{background:oklch(60% 0.20 25);}\n  .dark .ic-chip.low{background:oklch(28% 0.08 70);border-color:oklch(60% 0.14 70);color:oklch(82% 0.13 70);}\n  .dark .ic-chip.out{background:oklch(28% 0.08 25);border-color:oklch(55% 0.16 25);color:oklch(82% 0.13 25);}\n  .ic-qty{width:80px;padding:2px 8px;font-size:11.5px;border:1px solid currentColor;border-radius:10px;background:transparent;color:inherit;outline:none;font:inherit;font-weight:500;}\n  .ic-qty::placeholder{opacity:.5;}\n\n  /* Toast */\n  .toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border-strong);box-shadow:var(--shadow-pop);border-radius:12px;padding:11px 16px;font-size:13.5px;font-weight:500;display:flex;align-items:center;gap:10px;min-width:240px;max-width:380px;z-index:200;transform:translateY(8px);opacity:0;pointer-events:none;transition:all .22s;}\n  .toast.show{transform:translateY(0);opacity:1;}\n  .toast.ok{border-left:3px solid var(--pos);}\n  .toast.er{border-left:3px solid var(--neg);}\n  .toast.in{border-left:3px solid var(--accent);}\n\n  /* Modal */\n  .modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:150;overflow-y:auto;}\n  .modal.show{display:flex;}\n  .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:18px;width:100%;max-width:560px;box-shadow:var(--shadow-pop);}\n\n  /* Switch */\n  .switch{position:relative;width:38px;height:22px;background:var(--border-strong);border-radius:999px;cursor:pointer;transition:background .15s;}\n  .switch::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:999px;transition:transform .18s;box-shadow:0 1px 3px rgba(0,0,0,.2);}\n  .switch.on{background:var(--accent);}\n  .switch.on::after{transform:translateX(16px);}\n\n  /* Tables */\n  table.tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;}\n  .tbl th{text-align:left;padding:10px 12px;background:var(--surface-2);color:var(--text-2);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;}\n  .tbl td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:top;}\n  .tbl tr:hover td{background:var(--surface-2);}\n  .tbl tr:last-child td{border-bottom:none;}\n\n  /* Sparkline canvas */\n  .spark{width:100%;height:46px;display:block;}\n\n  /* Spinner */\n  .spin{display:inline-block;width:13px;height:13px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:sp .8s linear infinite;vertical-align:middle;opacity:.7;}\n  @keyframes sp{to{transform:rotate(360deg);}}\n\n  /* Layout */\n  .app-grid{display:grid;grid-template-columns:264px 1fr;min-height:100vh;}\n  aside.side{transition:transform .25s ease;}\n  @media(max-width:900px){\n    .app-grid{grid-template-columns:1fr;}\n    aside.side{position:fixed;inset:0 auto 0 0;width:280px;z-index:50;transform:translateX(-100%);box-shadow:var(--shadow-pop);}\n    aside.side.mobile-open{transform:translateX(0);}\n    .mobile-tabs{display:flex !important;}\n    .mobile-backdrop.show{display:block !important;}\n  }\n  .mobile-tabs{display:none;}\n  .mobile-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40;}\n  .scroll-x{overflow-x:auto;scrollbar-width:thin;}\n\n  /* Lucide */\n  [data-lucide]{width:16px;height:16px;stroke-width:1.75;}\n  .ic-lg [data-lucide]{width:20px;height:20px;}\n  .ic-sm [data-lucide]{width:14px;height:14px;}\n\n  /* Misc */\n  details > summary{cursor:pointer;list-style:none;}\n  details > summary::-webkit-details-marker{display:none;}\n  .skel{background:linear-gradient(90deg,var(--surface-2),var(--border),var(--surface-2));background-size:200% 100%;animation:sk 1.2s linear infinite;border-radius:6px;}\n  @keyframes sk{0%{background-position:200% 0;}100%{background-position:-200% 0;}}\n  .kbd{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--surface-2);border:1px solid var(--border);border-radius:5px;padding:1px 6px;color:var(--text-2);}\n\n  /* Pastel KPI cards (dashboard hero) */\n  .pkpi{\n    position:relative;border-radius:20px;padding:22px 24px;\n    border:1px solid color-mix(in oklch, var(--p-tone) 25%, transparent);\n    background:linear-gradient(135deg, color-mix(in oklch, var(--p-tone) 22%, var(--surface)) 0%, color-mix(in oklch, var(--p-tone) 8%, var(--surface)) 100%);\n    transition:transform .25s cubic-bezier(.2,.7,.2,1), box-shadow .25s;\n    overflow:hidden;\n  }\n  .pkpi:hover{transform:translateY(-3px);box-shadow:0 18px 40px -16px color-mix(in oklch, var(--p-tone) 45%, transparent);}\n  .pkpi-ic{\n    position:absolute;right:18px;bottom:14px;\n    width:64px;height:64px;border-radius:18px;\n    display:flex;align-items:center;justify-content:center;\n    background:color-mix(in oklch, var(--p-tone) 35%, var(--surface));\n    color:color-mix(in oklch, var(--p-tone) 80%, black);\n    opacity:.9;\n  }\n  .pkpi-ic [data-lucide]{width:30px;height:30px;stroke-width:1.8;}\n  .pkpi-eyebrow{color:color-mix(in oklch, var(--p-tone) 75%, black);font-weight:700;font-size:13.5px;letter-spacing:-.005em;}\n  .dark .pkpi{background:linear-gradient(135deg, color-mix(in oklch, var(--p-tone) 32%, var(--surface)) 0%, color-mix(in oklch, var(--p-tone) 12%, var(--surface)) 100%);}\n  .dark .pkpi-eyebrow{color:color-mix(in oklch, var(--p-tone) 85%, white);}\n  .dark .pkpi-ic{background:color-mix(in oklch, var(--p-tone) 45%, var(--surface));color:color-mix(in oklch, var(--p-tone) 90%, white);}\n\n  /* Circular ring stat card */\n  .ring-card{\n    background:var(--surface);border:1px solid var(--border);border-radius:18px;\n    padding:18px 20px;display:flex;align-items:center;justify-content:space-between;gap:14px;\n    transition:all .2s;\n  }\n  .ring-card:hover{box-shadow:var(--shadow-pop);transform:translateY(-2px);}\n  .ring-svg{width:64px;height:64px;flex-shrink:0;}\n  .ring-svg circle{transition:stroke-dashoffset .8s cubic-bezier(.3,.8,.3,1);}\n  .ring-svg .ring-bg{stroke:var(--surface-2);}\n\n  /* Topbar */\n  .nav-search{\n    display:flex;align-items:center;gap:10px;padding:9px 16px;\n    background:var(--surface-2);border:1px solid transparent;border-radius:999px;\n    color:var(--text-2);transition:all .15s;min-width:280px;\n  }\n  .nav-search:focus-within{background:var(--surface);border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in oklch, var(--accent) 18%, transparent);}\n  .nav-search input{background:transparent;border:none;outline:none;font:inherit;color:var(--text);width:100%;}\n  .nav-search input::placeholder{color:var(--text-3);}\n  .nav-bell{position:relative;width:38px;height:38px;border-radius:999px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;color:var(--text-2);}\n  .nav-bell:hover{background:var(--border);color:var(--text);}\n  .nav-bell-badge{\n    position:absolute;top:-2px;right:-2px;\n    min-width:18px;height:18px;border-radius:999px;\n    background:var(--accent);color:#fff;font-size:10.5px;font-weight:700;\n    display:flex;align-items:center;justify-content:center;padding:0 5px;\n    border:2px solid var(--bg);\n  }\n  .nav-user{\n    display:flex;align-items:center;gap:10px;padding:4px 10px 4px 4px;\n    border-radius:999px;cursor:pointer;transition:background .15s;\n  }\n  .nav-user:hover{background:var(--surface-2);}\n  .nav-avatar{width:36px;height:36px;border-radius:999px;background:linear-gradient(135deg,var(--accent),color-mix(in oklch, var(--accent) 70%, oklch(80% 0.18 320)));color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;font-size:13px;letter-spacing:-.02em;}\n\n  /* Sidebar CTA */\n  .side-cta{\n    border-radius:16px;padding:16px;color:#fff;position:relative;overflow:hidden;\n    background:linear-gradient(135deg, oklch(28% 0.06 230), oklch(20% 0.04 230));\n  }\n  .side-cta::before{\n    content:'';position:absolute;inset:-30% -30% auto auto;width:120px;height:120px;border-radius:50%;\n    background:radial-gradient(circle, color-mix(in oklch, var(--accent) 60%, transparent) 0%, transparent 70%);\n  }\n  .side-cta-arrow{\n    width:28px;height:28px;border-radius:999px;background:var(--accent);\n    display:flex;align-items:center;justify-content:center;color:#fff;\n    transition:transform .2s;\n  }\n  .side-cta:hover .side-cta-arrow{transform:translateX(3px);}\n<\u002Fstyle>\n<\u002Fhead>\n<body class=\"antialiased\">\n\n\n\n<!-- ============================================================== -->\n<!-- APP SHELL                                                     -->\n<!-- ============================================================== -->\n<div class=\"app-grid\">\n\n  <!-- SIDEBAR (desktop) -->\n  <aside class=\"side border-r hairline px-4 py-5 flex flex-col\" style=\"background:var(--surface);\">\n    <div class=\"flex items-center gap-2 px-2 mb-6\">\n      <div class=\"w-8 h-8 rounded-lg flex items-center justify-center\" style=\"background:var(--text);color:var(--bg);font-weight:800;letter-spacing:-.05em;\">yy<\u002Fdiv>\n      <div>\n        <div class=\"font-bold text-[15px] leading-tight\">yellowyellow<span class=\"muted\">.co<\u002Fspan><\u002Fdiv>\n        <div class=\"text-[11px] muted-2 mt-0.5\">Sales Console<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Store switcher -->\n    <div class=\"mb-5\">\n      <div class=\"text-[10.5px] font-semibold muted-2 tracking-widest px-2 mb-2\">STORES<\u002Fdiv>\n      <div id=\"store_switcher\" class=\"flex flex-col gap-1\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- View nav -->\n    <nav id=\"view_nav\" class=\"flex flex-col gap-0.5\">\n      <div class=\"text-[10.5px] font-semibold muted-2 tracking-widest px-2 mb-1\">WORKSPACE<\u002Fdiv>\n    <\u002Fnav>\n\n    <div class=\"mt-auto pt-4 border-t hairline\">\n      <button class=\"side-cta w-full flex items-start gap-3 text-left mb-3\" onclick=\"switchView('entry')\">\n        <div class=\"flex-1 min-w-0 relative z-10\">\n          <div class=\"font-bold text-[14px] text-white\">บันทึกยอดวันนี้<\u002Fdiv>\n          <div class=\"text-[11.5px] text-white/70 mt-0.5 leading-snug\">บันทึก + ส่ง LINE &amp; Sheets อัตโนมัติ<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"side-cta-arrow relative z-10\"><i data-lucide=\"arrow-right\" style=\"width:14px;height:14px\"><\u002Fi><\u002Fdiv>\n      <\u002Fbutton>\n      <div class=\"flex items-center justify-between px-2\">\n        <div class=\"flex items-center gap-2\">\n          <i data-lucide=\"moon\"><\u002Fi>\n          <span class=\"text-[13px] muted\">Dark mode<\u002Fspan>\n        <\u002Fdiv>\n        <div id=\"theme_toggle\" class=\"switch\" role=\"switch\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"text-[10.5px] muted-2 mt-3 px-2 leading-relaxed\">\n        v1.0 · <span class=\"kbd\">⌘K<\u002Fspan> nav · all data local\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <!-- Mobile backdrop (clicks close sidebar) -->\n  <div class=\"mobile-backdrop\" onclick=\"toggleSidebar()\"><\u002Fdiv>\n\n  <!-- MAIN -->\n  <main class=\"flex flex-col\" style=\"min-width:0;\">\n\n    <!-- Topbar -->\n    <header class=\"px-5 md:px-8 py-3.5 border-b hairline flex items-center gap-3 sticky top-0 z-20\" style=\"background:color-mix(in oklch, var(--bg) 85%, transparent);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);\">\n      <button class=\"btn btn-icon md:hidden flex-shrink-0\" onclick=\"toggleSidebar()\" title=\"Menu\"><i data-lucide=\"menu\"><\u002Fi><\u002Fbutton>\n      <label class=\"nav-search flex-1 max-w-md\" onclick=\"openCmd()\">\n        <i data-lucide=\"search\" style=\"width:15px;height:15px;flex-shrink:0;\"><\u002Fi>\n        <input placeholder=\"ค้นหา หน้า / ร้าน / รายการ...\" onfocus=\"openCmd();this.blur()\" readonly=\"\" style=\"cursor:pointer;\">\n        <span class=\"kbd hidden md:inline\">⌘K<\u002Fspan>\n      <\u002Flabel>\n      <div class=\"flex items-center gap-2 ml-auto flex-shrink-0\">\n        <span id=\"topbar_hook\" class=\"pill pill-warn hidden xl:inline-flex\" style=\"cursor:pointer\">⚙️ ตั้งค่า<\u002Fspan>\n        <button class=\"nav-bell\" title=\"แจ้งเตือนสต็อก\" onclick=\"switchView('stock')\">\n          <i data-lucide=\"bell\" style=\"width:16px;height:16px;\"><\u002Fi>\n          <span class=\"nav-bell-badge\" id=\"topbar_alert_badge\" style=\"display:none\">0<\u002Fspan>\n        <\u002Fbutton>\n        <button class=\"nav-bell hidden md:flex\" title=\"ตั้งค่า\" onclick=\"switchView('settings')\">\n          <i data-lucide=\"settings\" style=\"width:16px;height:16px;\"><\u002Fi>\n        <\u002Fbutton>\n        <div class=\"nav-user\" onclick=\"switchView('admin')\">\n          <div class=\"nav-avatar\" id=\"nav_avatar\">yy<\u002Fdiv>\n          <div class=\"hidden lg:block leading-tight\">\n            <div class=\"font-semibold text-[13px]\">Admin<\u002Fdiv>\n            <div class=\"text-[11px] muted-2\" id=\"nav_user_sub\">workspace<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- Hidden but kept for backward compat with renderShell -->\n      <h1 id=\"topbar_title\" hidden=\"\"><\u002Fh1>\n      <span id=\"topbar_sub_pill\" hidden=\"\"><\u002Fspan>\n      <span id=\"topbar_sub\" hidden=\"\"><\u002Fspan>\n    <\u002Fheader>\n\n    <!-- View slot -->\n    <div id=\"view\" class=\"flex-1 px-5 md:px-8 py-6 md:py-8 pb-24 md:pb-8\" style=\"min-height:0;\"><\u002Fdiv>\n\n    <!-- Mobile bottom tabs -->\n    <nav class=\"mobile-tabs fixed bottom-0 left-0 right-0 border-t hairline px-2 py-1.5 z-30\" style=\"background:color-mix(in oklch, var(--bg) 90%, transparent);backdrop-filter:blur(12px);\">\n      <div id=\"mobile_tabs\" class=\"flex justify-around\"><\u002Fdiv>\n    <\u002Fnav>\n  <\u002Fmain>\n<\u002Fdiv>\n\n<!-- Toast -->\n<div class=\"toast\" id=\"toast\"><i data-lucide=\"info\" id=\"toast_ic\"><\u002Fi><span id=\"toast_msg\">—<\u002Fspan><\u002Fdiv>\n\n<!-- Cmd palette modal -->\n<div class=\"modal\" id=\"cmd_modal\">\n  <div class=\"modal-box mt-16\">\n    <div class=\"p-3 border-b hairline\">\n      <input id=\"cmd_inp\" class=\"inp\" placeholder=\"ค้นหา หน้า / ร้าน / คำสั่ง...\" style=\"border:none;\">\n    <\u002Fdiv>\n    <div id=\"cmd_results\" class=\"p-2 max-h-[60vh] overflow-y-auto\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n/* ============================================================== *\n *  yy. — Unified multi-store sales console\n *  Single file, vanilla JS ES6+, localStorage backed.\n * ============================================================== */\n\n/* --------- 1. STORE CONFIGURATIONS --------- */\n/* Each store: schema (basic/sale/cost/(boxegg)), inventory catalog,\n   accent colors, calc behavior, payload + line message builder.    */\n\nconst STORE_DEFS = {\n  /* ----- 1A. ร้านนมตุ๋น (Blue) — units-based ----- */\n  nmtun: {\n    id: 'nmtun',\n    name: 'ร้านนมตุ๋น',\n    sub: 'เครื่องดื่มนม · Steamed Milk',\n    shortName: 'นมตุ๋น',\n    badge: '🐄',\n    icon: 'milk',\n    accentHue: 245,\n    saleType: 'units',         // sale fields are unit counts (glasses)\n    hasDynCosts: true,         // dynamic ad-hoc cost rows\n    hasBoxEgg: false,\n    salesUnit: 'แก้ว',\n    defaultBasic: [\n      {id:'fd_date',     key:'date',     label:'วันที่',   type:'date', req:true, fixed:true},\n      {id:'fd_recorder', key:'recorder', label:'ผู้บันทึก', type:'text', req:false, fixed:false, ph:'ชื่อ...'},\n      {id:'fd_note',     key:'note',     label:'หมายเหตุ',  type:'text', req:false, fixed:true,  ph:'เช่น พี่บิ๊กเบิก 400'}\n    ],\n    defaultSale: [\n      {id:'fs_float',  key:'float',  label:'เงินทอนเริ่มต้น', type:'number', req:false, fixed:true, ph:'0', role:'minus', section:'cash'},\n      {id:'fs_cash',   key:'cashIn', label:'เงินสดรับรวม',    type:'number', req:true,  fixed:true, ph:'0', role:'plus',  section:'cash', sub:'รวมเงินทอน'},\n      {id:'fs_ice',    key:'ice',    label:'ค่าน้ำแข็ง',      type:'number', req:false, fixed:false,ph:'0', role:'minus', section:'cash'},\n      {id:'fs_cold',   key:'cold',   label:'แก้วเย็น',        type:'number', req:false, fixed:true, ph:'0', role:'unit',  section:'units'},\n      {id:'fs_hotG',   key:'hotG',   label:'แก้วร้อน (แก้ว)', type:'number', req:false, fixed:true, ph:'0', role:'unit',  section:'units'},\n      {id:'fs_hotB',   key:'hotB',   label:'แก้วร้อน (ถุง)',  type:'number', req:false, fixed:true, ph:'0', role:'unit',  section:'units', sub:'≈ 5 แก้ว/ถุง'},\n      {id:'fs_bottle', key:'bottle', label:'นมขวด',          type:'number', req:false, fixed:false,ph:'0', role:'count', section:'units'}\n    ],\n    defaultCost: [],\n    defaultCatalog: [\n      {cat:'🥛 นม / วัตถุดิบหลัก',  items:['นมตุ๋น','นมผสม','นมขนหวาน','นมขนจืด','นม (นมสด)','โยเกิร์ต','น้ำผึ้ง']},\n      {cat:'🧴 ซอส / แยม / ไซรัป',  items:['คาราเมล','ซอสมะม่วง','ซอสมิกซ์','แยมสตอ','ไซรัปมะม่วง','โอวัลติน','ไวท์มอลต์','โกโก้','ผงมัทฉะ','ผงนัว','ผงปั่น']},\n      {cat:'🧁 ท็อปปิ้ง / อื่นๆ',    items:['โอริโอ้','ปีโป้','เผือก','นูเทลล่า','มะม่วง (ผลไม้)']},\n      {cat:'🥤 ภาชนะ / บรรจุภัณฑ์',  items:['แก้วเย็น','แก้วร้อน','ฝาโดม','หลอดเย็น','หลอดไข่มุก','ถุงทิ้วแก้ว','ถุงเย็น 10×15']},\n      {cat:'🧹 อุปกรณ์ / สิ่งของ',   items:['ทิชชู่','เมจิกคลีน','ผงซักฟอก','น้ำถัง','น้ำแดงเฮลบูบอย']}\n    ],\n    defaultTarget: 30000\n  },\n  /* ----- 1B. สุกี้ภัสสร (Red) — money/role-based ----- */\n  pussorn: {\n    id: 'pussorn',\n    name: 'สุกี้ภัสสร',\n    sub: 'สุกี้ · Pussorn Suki',\n    shortName: 'ภัสสร',\n    badge: '🍲',\n    icon: 'utensils-crossed',\n    accentHue: 25,\n    saleType: 'money',\n    hasDynCosts: false,\n    hasBoxEgg: false,\n    salesUnit: '฿',\n    defaultBasic: [\n      {id:'fd_date',     key:'date',     label:'วันที่',   type:'date', req:true, fixed:true},\n      {id:'fd_recorder', key:'recorder', label:'ผู้บันทึก', type:'text', req:false, fixed:false, ph:'ชื่อ...'}\n    ],\n    defaultSale: [\n      {id:'fs_cash',   key:'cashIn',  label:'เงินสด',          type:'number', req:true,  fixed:true,  ph:'0', role:'plus',  section:'sale'},\n      {id:'fs_float',  key:'float',   label:'เงินทอนเริ่มต้น', type:'number', req:false, fixed:true,  ph:'0', role:'minus', section:'sale'},\n      {id:'fs_orders', key:'orders',  label:'จำนวนเสิร์ฟ',     type:'number', req:false, fixed:false, ph:'0', role:'count', section:'sale'}\n    ],\n    defaultCost: [\n      {id:'fc_water', key:'water',     label:'ค่าน้ำ',         ph:'0', fixed:false},\n      {id:'fc_ice',   key:'ice',       label:'น้ำแข็ง',        ph:'0', fixed:false},\n      {id:'fc_other', key:'otherCost', label:'ค่าใช้จ่ายอื่น', ph:'0', fixed:false}\n    ],\n    defaultCatalog: [\n      {cat:'🥩 เนื้อสัตว์ / ทะเล',  items:['หมูสด','หมูสุก','กุ้งสด','กุ้งสุก','หมึกวง','ปลาหมึกรอบ','ไข่']},\n      {cat:'🥬 ผัก / เส้น',         items:['ผักกาดขาว','ชื่นฉาย','วุ้นเส้น','บะหมี่หยก','เส้นมัน']},\n      {cat:'🫕 ซอส / เครื่องปรุง',  items:['น้ำจิ้มสุกี้กวางตุ้ง','น้ำจิ้มสุกี้เต้าหู้ยี้','ซุปฟ้าไทย','หม่าลาฟ้าไทย','ผงหม่าล่า','น้ำมัน']},\n      {cat:'📦 บรรจุภัณฑ์',         items:['ถุงหิ้ว 7x15','กล่องน้ำกลับบ้าน','กล่องกระดาษคราฟ','ถ้วยหานนี','ช้อน','ส้อม','ตะเกียบ']},\n      {cat:'🔧 อุปกรณ์อื่นๆ',       items:['น้ำถัง','แก๊สหุงต้ม','ใบอดเดอร์','ถุงดำ','ถุงเย็น 10x15']}\n    ],\n    defaultTarget: 90000\n  },\n  /* ----- 1C. ร้านข้าวสุกี้ไข่ข้น (Orange) — money + box/egg ----- */\n  khaow: {\n    id: 'khaow',\n    name: 'ข้าวสุกี้ไข่ข้น',\n    sub: 'ข้าวสุกี้ไข่ข้น · Khao Suki Khai Khon',\n    shortName: 'ไข่ข้น',\n    badge: '🥚',\n    icon: 'egg',\n    accentHue: 55,\n    saleType: 'money',\n    hasDynCosts: false,\n    hasBoxEgg: true,\n    salesUnit: '฿',\n    defaultBasic: [\n      {id:'fd_date',     key:'date',     label:'วันที่',   type:'date', req:true, fixed:true},\n      {id:'fd_recorder', key:'recorder', label:'ผู้บันทึก', type:'text', req:false, fixed:false, ph:'ชื่อ...'}\n    ],\n    defaultSale: [\n      {id:'fs_cash',  key:'cashIn',       label:'เงินสด',             type:'number', req:true,  fixed:true,  ph:'0', role:'plus',  section:'sale'},\n      {id:'fs_float', key:'float',        label:'เงินทอนเริ่มต้น',    type:'number', req:false, fixed:true,  ph:'0', role:'minus', section:'sale'},\n      {id:'fs_serv',  key:'servings',     label:'จำนวนเสิร์ฟ (ปกติ)', type:'number', req:false, fixed:false, ph:'0', role:'count', section:'sale'},\n      {id:'fs_half',  key:'servingsHalf', label:'เสิร์ฟลด 50%',       type:'number', req:false, fixed:false, ph:'0', role:'count', section:'sale'},\n      {id:'fs_box',   key:'boxesLeft',    label:'กล่องเปล่าเหลือ',    type:'number', req:false, fixed:false, ph:'0', role:'count', section:'sale'}\n    ],\n    defaultCost: [\n      {id:'fc_ice',   key:'ice',       label:'ค่าน้ำแข็ง',     ph:'0', fixed:false},\n      {id:'fc_gas',   key:'gas',       label:'ค่าแก๊ส',        ph:'0', fixed:false},\n      {id:'fc_other', key:'otherCost', label:'ค่าใช้จ่ายอื่น', ph:'0', fixed:false}\n    ],\n    defaultBoxEgg: [\n      {id:'fb_sbox', key:'startBoxes', label:'กล่องเริ่มต้น', ph:'0', fixed:true},\n      {id:'fb_ebox', key:'endBoxes',   label:'กล่องคงเหลือ',  ph:'0', fixed:true},\n      {id:'fb_segg', key:'startEggs',  label:'ไข่เริ่มต้น',   ph:'0', fixed:true},\n      {id:'fb_eegg', key:'endEggs',    label:'ไข่คงเหลือ',    ph:'0', fixed:true}\n    ],\n    defaultCatalog: [\n      {cat:'🥚 ไข่ / วัตถุดิบหลัก',   items:['ไข่ไก่','ข้าวสาร','น้ำมัน']},\n      {cat:'🥩 เนื้อสัตว์ / ทะเล',    items:['หมูสด','หมูสุก','หมึก','กุ้งสด','กุ้งสุก']},\n      {cat:'🫕 ซอส / เครื่องปรุง',    items:['น้ำจิ้มสุกี้','พริกน้ำปลา']},\n      {cat:'📦 บรรจุภัณฑ์',           items:['กล่องเปล่า','ถุงหิ้วลูกค้า','ช้อนส้อม','ทิชชู่แห้ง','ทิชชู่เปียก']},\n      {cat:'💧 น้ำ / เชื้อเพลิง',     items:['น้ำถัง','แก๊สหุงต้ม']}\n    ],\n    defaultTarget: 60000\n  }\n};\n\nconst STORE_IDS = ['nmtun','pussorn','khaow'];\n\nconst VIEWS = [\n  {id:'dashboard', label:'Dashboard',  icon:'layout-dashboard', th:'แดชบอร์ด'},\n  {id:'entry',     label:'บันทึกยอดขาย', icon:'pencil-line',     th:'บันทึกยอดขาย'},\n  {id:'history',   label:'ประวัติ',     icon:'history',         th:'ประวัติ'},\n  {id:'stock',     label:'สต็อก',       icon:'package',         th:'สต็อก'},\n  {id:'admin',     label:'แอดมิน',      icon:'sliders-horizontal', th:'แอดมิน'},\n  {id:'settings',  label:'ตั้งค่า',     icon:'settings',        th:'ตั้งค่า'}\n];\n\n/* --------- 2. STATE / STORAGE --------- */\nconst LS = {\n  get(k, def=null){ try{ const v = localStorage.getItem(k); return v==null ? def : JSON.parse(v); }catch(e){ return def; } },\n  set(k, v){ localStorage.setItem(k, JSON.stringify(v)); },\n  raw(k){ return localStorage.getItem(k); }\n};\n\nfunction k(storeId, name){ return `yy.${storeId}.${name}`; }\n\nfunction getStoreState(storeId){\n  const def = STORE_DEFS[storeId];\n  return {\n    basic:    LS.get(k(storeId,'basic'))    || deepCopy(def.defaultBasic),\n    sale:     LS.get(k(storeId,'sale'))     || deepCopy(def.defaultSale),\n    cost:     LS.get(k(storeId,'cost'))     || deepCopy(def.defaultCost),\n    boxegg:   def.hasBoxEgg ? (LS.get(k(storeId,'boxegg')) || deepCopy(def.defaultBoxEgg)) : [],\n    catalog:  LS.get(k(storeId,'catalog'))  || deepCopy(def.defaultCatalog),\n    records:  LS.get(k(storeId,'records'))  || [],\n    hook:     LS.get(k(storeId,'hook'))     || '',\n    target:   LS.get(k(storeId,'target'))   || def.defaultTarget,\n    accentHue: LS.get(k(storeId,'accentHue')) ?? def.accentHue\n  };\n}\nfunction saveField(storeId, key, value){ LS.set(k(storeId,key), value); }\n\n/* --------- 3. GLOBAL STATE --------- */\nconst state = {\n  activeStore: LS.get('yy.activeStore') || 'nmtun',\n  view: 'dashboard',                  // current view (per-store remembered)\n  theme: LS.get('yy.theme') || 'light',\n  stores: {},                          // storeId → state object\n  formDraft: {},                       // ephemeral form values\n  invState: {},                        // {name: 'normal'|'low'|'out'}\n  invNotes: {},                        // {name: qty string}\n  dynCosts: [],                        // [{amt,desc}] for nmtun\n  editMode: { catalog: false, fields: false },\n  search: ''\n};\n\nfunction loadAllStores(){\n  STORE_IDS.forEach(id => state.stores[id] = getStoreState(id));\n}\nfunction reloadStore(id){ state.stores[id] = getStoreState(id); }\n\n/* --------- 4. HELPERS --------- */\nfunction deepCopy(o){ return JSON.parse(JSON.stringify(o)); }\nfunction fmt(n){ return Number(n||0).toLocaleString('th-TH'); }\nfunction fmtMoney(n){ const v = Number(n||0); return (v<0?'-':'') + '฿' + Math.abs(v).toLocaleString('th-TH'); }\nfunction todayISO(){ const d = new Date(); return d.toISOString().split('T')[0]; }\nfunction fmtDate(iso){ if(!iso) return '-'; const [y,m,d]=iso.split('-'); return d+'/'+m+'/'+String(+y+543).slice(-2); }\nfunction fmtDateLong(iso){ if(!iso) return '-'; const d=new Date(iso); const days=['อา','จ','อ','พ','พฤ','ศ','ส']; return `วัน${days[d.getDay()]} ${fmtDate(iso)}`; }\nfunction escHtml(s){ return String(s==null?'':s).replace(/[&<>\"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c])); }\nfunction uid(){ return 'fx_'+Math.random().toString(36).slice(2,9); }\nfunction isoOffset(days){ const d = new Date(); d.setDate(d.getDate()-days); return d.toISOString().split('T')[0]; }\nfunction daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }\n\n/* --------- 5. THEME / ACCENT --------- */\nfunction applyTheme(){\n  document.documentElement.classList.toggle('dark', state.theme==='dark');\n  document.documentElement.classList.toggle('light', state.theme==='light');\n  document.getElementById('theme_toggle').classList.toggle('on', state.theme==='dark');\n}\nfunction applyAccent(){\n  const s = state.stores[state.activeStore];\n  const hue = s.accentHue;\n  const isDark = state.theme==='dark';\n  const l = isDark ? 72 : 60;\n  const root = document.documentElement.style;\n  root.setProperty('--accent',      `oklch(${l}% 0.16 ${hue})`);\n  root.setProperty('--accent-soft', isDark ? `oklch(28% 0.07 ${hue})` : `oklch(95% 0.04 ${hue})`);\n  root.setProperty('--accent-ink',  isDark ? `oklch(85% 0.10 ${hue})` : `oklch(40% 0.18 ${hue})`);\n}\n\n/* --------- 6. TOAST --------- */\nlet toastT;\nfunction toast(msg, kind='in'){\n  const t = document.getElementById('toast');\n  t.className = 'toast show ' + kind;\n  document.getElementById('toast_msg').textContent = msg;\n  const ic = {ok:'check-circle-2', er:'alert-circle', in:'info'}[kind];\n  document.getElementById('toast_ic').setAttribute('data-lucide', ic);\n  lucide.createIcons({nodes:[document.getElementById('toast_ic')]});\n  clearTimeout(toastT);\n  toastT = setTimeout(()=> t.classList.remove('show'), 2800);\n}\n\n/* --------- 7. CALCULATION --------- */\nfunction computeNet(storeId, valuesObj, dynCostsArr){\n  const def = STORE_DEFS[storeId];\n  const st = state.stores[storeId];\n  let plus=0, minus=0, costs=0, dyn=0;\n  [...st.sale].forEach(f => {\n    const v = +valuesObj[f.key] || 0;\n    if(f.role==='plus') plus += v;\n    else if(f.role==='minus') minus += v;\n  });\n  st.cost.forEach(f => { costs += +valuesObj[f.key]||0; });\n  if(def.hasDynCosts && Array.isArray(dynCostsArr))\n    dyn = dynCostsArr.reduce((s,c)=>s + (+c.amt||0), 0);\n  return plus - minus - costs - dyn;\n}\nfunction computeTotal(storeId, valuesObj){\n  const def = STORE_DEFS[storeId];\n  const st = state.stores[storeId];\n  if(def.saleType==='units'){\n    return st.sale.filter(f=>f.role==='unit').reduce((s,f)=>s + (+valuesObj[f.key]||0), 0);\n  }\n  return st.sale.filter(f=>f.role==='plus').reduce((s,f)=>s + (+valuesObj[f.key]||0), 0);\n}\n\n/* --------- 8. INVENTORY (chip cycle) --------- */\nfunction cycleInvState(name){\n  const cur = state.invState[name] || 'normal';\n  state.invState[name] = cur==='normal' ? 'low' : cur==='low' ? 'out' : 'normal';\n  if(state.invState[name] !== 'low') delete state.invNotes[name];\n  renderInventoryArea();\n}\nfunction getInventorySummary(){\n  const left=[], out=[];\n  const st = state.stores[state.activeStore];\n  st.catalog.forEach(sec => sec.items.forEach(name => {\n    const s = state.invState[name];\n    if(s==='low'){\n      const q = state.invNotes[name]||'';\n      left.push(q ? `${name} (${q})` : name);\n    } else if(s==='out'){\n      out.push(name);\n    }\n  }));\n  return {leftItems:left, outItems:out};\n}\nfunction resetInventory(){ state.invState={}; state.invNotes={}; }\n\n/* --------- 9. LINE MESSAGE BUILDER --------- */\nfunction buildLineMsg(storeId, rec){\n  const def = STORE_DEFS[storeId];\n  const st = state.stores[storeId];\n  const lines = [`${def.badge} ${def.name} — ยอดขายประจำวัน`];\n  lines.push(`📅 ${fmtDate(rec.dateISO||rec.date)}${rec.recorder?' | 👤 '+rec.recorder:''}`);\n  lines.push('');\n  lines.push(`💰 เงินสดสุทธิ: ${fmtMoney(rec.net)}`);\n  // cash composition\n  const cashIn = +rec.cashIn||0, fl = +rec.float||0;\n  const costSum = st.cost.reduce((s,f)=>s+(+rec[f.key]||0),0);\n  const dynSum = (rec.costsDyn||[]).reduce((s,c)=>s+(+c.amt||0),0);\n  const compose = [];\n  if(cashIn) compose.push(`รับ ${fmtMoney(cashIn)}`);\n  if(fl) compose.push(`ทอน ${fmtMoney(fl)}`);\n  st.cost.forEach(f => { const v=+rec[f.key]||0; if(v) compose.push(`${f.label} ${fmtMoney(v)}`); });\n  if(dynSum) compose.push(`อื่นๆ ${fmtMoney(dynSum)}`);\n  if(compose.length) lines.push('   ' + compose.join(' | '));\n  if(dynSum && rec.costsDyn){\n    const detail = rec.costsDyn.filter(c=>c.amt||c.desc).map(c=>c.desc?`${c.desc} ฿${fmt(c.amt)}`:`฿${fmt(c.amt)}`).join(', ');\n    if(detail) lines.push(`   📌 ${detail}`);\n  }\n  lines.push('');\n  // sale\n  if(def.saleType==='units'){\n    lines.push(`${def.badge} ยอดขาย: ${fmt(rec.total)} ${def.salesUnit}`);\n    const parts=[];\n    st.sale.filter(f=>f.role==='unit' || f.role==='count').forEach(f => {\n      const v = +rec[f.key]||0;\n      if(v) parts.push(`${f.label} ${fmt(v)}`);\n    });\n    if(parts.length) lines.push('   ' + parts.join(' | '));\n  } else {\n    const parts=[];\n    st.sale.filter(f=>f.role==='count').forEach(f => {\n      const v = +rec[f.key]||0;\n      if(v) parts.push(`${f.label} ${fmt(v)}`);\n    });\n    if(parts.length) lines.push(`📋 ${parts.join(' | ')}`);\n  }\n  // box/egg\n  if(def.hasBoxEgg){\n    const be = st.boxegg.map(f=>({l:f.label,v:+rec[f.key]||0}));\n    if(be.some(x=>x.v)) lines.push('📦 ' + be.map(x=>`${x.l}: ${fmt(x.v)}`).join(' | '));\n  }\n  lines.push('');\n  lines.push(`⚠️ ของเหลือ: ${(rec.leftItems||[]).join(', ')||'ไม่มี'}`);\n  lines.push(`❌ ของหมด: ${(rec.outItems||[]).join(', ')||'ไม่มี'}`);\n  if(rec.note) lines.push(`📝 ${rec.note}`);\n  return lines.join('\\n');\n}\n\n/* --------- 10. PAYLOAD BUILDER --------- */\nfunction buildPayload(storeId, rec){\n  const def = STORE_DEFS[storeId];\n  const st = state.stores[storeId];\n  const payload = {\n    store: def.id,\n    storeName: def.name,\n    date: fmtDate(rec.dateISO||rec.date),\n    dateISO: rec.dateISO||rec.date,\n    recorder: rec.recorder||'',\n    note: rec.note||'',\n    net: rec.net||0,\n    total: rec.total||0,\n    leftItems: (rec.leftItems||[]).join(', '),\n    outItems: (rec.outItems||[]).join(', '),\n    timestamp: new Date().toLocaleString('th-TH',{timeZone:'Asia/Bangkok'}),\n  };\n  // unify all field keys → values\n  [...st.sale, ...st.cost, ...(def.hasBoxEgg?st.boxegg:[])].forEach(f=>{\n    payload[f.key] = rec[f.key] || 0;\n  });\n  if(def.hasDynCosts){\n    const dc = rec.costsDyn||[];\n    payload.otherCost = dc.reduce((s,c)=>s+(+c.amt||0),0);\n    payload.costDetails = dc.filter(c=>c.amt||c.desc).map(c=>c.desc?`${c.desc}(฿${c.amt})`:`฿${c.amt}`).join(', ');\n  } else {\n    payload.costDetails = rec.costDetails||'';\n  }\n  payload.lineMessage = buildLineMsg(storeId, rec);\n  return payload;\n}\n\n/* --------- 11. SUBMIT / SYNC --------- */\nasync function postWebhook(storeId, rec){\n  const st = state.stores[storeId];\n  if(!st.hook) return {ok:false, reason:'no-hook'};\n  const payload = buildPayload(storeId, rec);\n  try{\n    await fetch(st.hook, {method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'}, body:JSON.stringify(payload)});\n    return {ok:true};\n  }catch(e){\n    return {ok:false, reason:e.message};\n  }\n}\nasync function syncRecord(storeId, idx, btnEl){\n  const st = state.stores[storeId];\n  const rec = st.records[idx];\n  if(btnEl){ btnEl.disabled=true; btnEl.innerHTML='<span class=\"spin\"><\u002Fspan>'; }\n  const r = await postWebhook(storeId, rec);\n  if(r.ok){\n    rec.synced = true;\n    LS.set(k(storeId,'records'), st.records);\n    if(btnEl){ btnEl.disabled=false; btnEl.innerHTML='<i data-lucide=\"check\"><\u002Fi>'; lucide.createIcons({nodes:[btnEl]}); }\n    toast('✅ ส่งสำเร็จ','ok');\n  } else {\n    if(btnEl){ btnEl.disabled=false; btnEl.innerHTML='<i data-lucide=\"alert-circle\"><\u002Fi>'; lucide.createIcons({nodes:[btnEl]}); }\n    toast(r.reason==='no-hook' ? '⚙️ ยังไม่ได้ตั้งค่า webhook' : 'ส่งไม่ได้: '+r.reason, 'er');\n  }\n}\nasync function syncAll(storeId){\n  const st = state.stores[storeId];\n  if(!st.hook){ toast('⚙️ ยังไม่ได้ตั้งค่า webhook','er'); return; }\n  let ok=0, fail=0;\n  toast(`⏳ กำลังส่ง ${st.records.length} รายการ...`,'in');\n  for(const rec of st.records){\n    const r = await postWebhook(storeId, rec);\n    if(r.ok){ rec.synced=true; ok++; } else fail++;\n    await new Promise(r=>setTimeout(r,250));\n  }\n  LS.set(k(storeId,'records'), st.records);\n  toast(`✅ ส่ง ${ok} รายการ${fail?` · ล้มเหลว ${fail}`:''}`, ok>0?'ok':'er');\n  renderView();\n}\n\n/* --------- 12. RENDER: SHELL --------- */\nfunction renderShell(){\n  // Store switcher\n  const sw = document.getElementById('store_switcher');\n  sw.innerHTML = STORE_IDS.map(id => {\n    const d = STORE_DEFS[id];\n    const active = state.activeStore===id;\n    return `<button class=\"nav-item ${active?'active':''}\" onclick=\"switchStore('${id}')\">\n      <span class=\"text-base leading-none\">${d.badge}<\u002Fspan>\n      <span class=\"flex-1 text-left truncate\">${escHtml(d.shortName)}<\u002Fspan>\n      ${active?'<i data-lucide=\"circle-dot\"><\u002Fi>':''}\n    <\u002Fbutton>`;\n  }).join('');\n\n  // View nav (desktop)\n  const nav = document.getElementById('view_nav');\n  nav.innerHTML = `<div class=\"text-[10.5px] font-semibold muted-2 tracking-widest px-2 mb-1\">WORKSPACE<\u002Fdiv>` + \n    VIEWS.map(v => `<button class=\"nav-item ${state.view===v.id?'active':''}\" onclick=\"switchView('${v.id}')\">\n      <i data-lucide=\"${v.icon}\"><\u002Fi><span>${v.th}<\u002Fspan>\n    <\u002Fbutton>`).join('');\n\n  // Mobile tabs (compact, only 5 most-used)\n  const mt = document.getElementById('mobile_tabs');\n  mt.innerHTML = VIEWS.slice(0,5).map(v => `<button class=\"flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-lg ${state.view===v.id?'text-accent-ink bg-accent-soft':'muted'}\" onclick=\"switchView('${v.id}')\">\n    <i data-lucide=\"${v.icon}\" style=\"width:18px;height:18px\"><\u002Fi>\n    <span class=\"text-[10.5px] font-medium\">${v.th}<\u002Fspan>\n  <\u002Fbutton>`).join('');\n\n  // Topbar\n  const d = STORE_DEFS[state.activeStore];\n  const v = VIEWS.find(v=>v.id===state.view) || VIEWS[0];\n  document.getElementById('topbar_title').textContent = `${v.th}`;\n  document.getElementById('topbar_sub').textContent = `${d.name} · ${d.sub}`;\n  const pill = document.getElementById('topbar_sub_pill');\n  pill.textContent = d.badge + ' ' + d.shortName;\n  pill.className = 'pill pill-accent hidden lg:inline-flex';\n\n  // User avatar reflects active store\n  const av = document.getElementById('nav_avatar');\n  if(av){ av.textContent = d.badge; av.style.fontSize='18px'; }\n  const us = document.getElementById('nav_user_sub');\n  if(us){ us.textContent = d.shortName + ' workspace'; }\n\n  // Stock alert badge — items low/out across last 14 days, current store\n  const st = state.stores[state.activeStore];\n  const alertCount = (() => {\n    const set = new Set();\n    st.records.filter(r=>r.dateISO>=isoOffset(14)).forEach(r=>{\n      (r.leftItems||[]).forEach(s=>set.add('low:'+s.replace(/\\s*\\(.+\\)$/,'')));\n      (r.outItems||[]).forEach(s=>set.add('out:'+s));\n    });\n    return set.size;\n  })();\n  const badge = document.getElementById('topbar_alert_badge');\n  if(badge){\n    if(alertCount>0){ badge.style.display='flex'; badge.textContent = alertCount>99?'99+':alertCount; }\n    else badge.style.display='none';\n  }\n\n  const hp = document.getElementById('topbar_hook');\n  if(state.stores[state.activeStore].hook){\n    hp.className = 'pill pill-pos hidden lg:inline-flex';\n    hp.innerHTML = '<i data-lucide=\"link\" style=\"width:11px;height:11px\"><\u002Fi> เชื่อมต่อแล้ว';\n  } else {\n    hp.className = 'pill pill-warn hidden lg:inline-flex';\n    hp.innerHTML = '<i data-lucide=\"alert-triangle\" style=\"width:11px;height:11px\"><\u002Fi> ตั้งค่าเชื่อมต่อ';\n    hp.style.cursor='pointer';\n    hp.onclick = ()=> switchView('settings');\n  }\n}\n\nfunction toggleSidebar(){\n  const aside = document.querySelector('aside.side');\n  const bd = document.querySelector('.mobile-backdrop');\n  if(!aside) return;\n  aside.classList.toggle('mobile-open');\n  if(bd) bd.classList.toggle('show');\n}\n\n/* --------- 13. NAVIGATION --------- */\nfunction switchStore(id){\n  if(!STORE_DEFS[id]) return;\n  state.activeStore = id;\n  LS.set('yy.activeStore', id);\n  state.view = LS.get('yy.lastView.'+id) || 'dashboard';\n  resetInventory();\n  state.dynCosts = [];\n  state.formDraft = {};\n  applyAccent();\n  renderShell();\n  renderView();\n  lucide.createIcons();\n}\nfunction switchView(v){\n  if(!VIEWS.find(x=>x.id===v)) return;\n  state.view = v;\n  LS.set('yy.lastView.'+state.activeStore, v);\n  renderShell();\n  renderView();\n  lucide.createIcons();\n  window.scrollTo({top:0,behavior:'smooth'});\n}\n\n/* --------- 14. RENDER: VIEW DISPATCH --------- */\nfunction renderView(){\n  const root = document.getElementById('view');\n  const fns = { dashboard:renderDashboard, entry:renderEntry, history:renderHistory, stock:renderStock, admin:renderAdmin, settings:renderSettings };\n  root.innerHTML = '<div class=\"muted text-center py-12\"><span class=\"spin\"><\u002Fspan> กำลังโหลด...<\u002Fdiv>';\n  setTimeout(()=>{ (fns[state.view]||renderDashboard)(root); lucide.createIcons(); }, 20);\n}\n\n<\u002Fscript>\n\n<!-- ============================================================== -->\n<!-- VIEW: DASHBOARD                                                 -->\n<!-- ============================================================== -->\n<script>\nfunction renderDashboard(root){\n  const allStores = STORE_IDS.map(id => ({id, def:STORE_DEFS[id], state:state.stores[id]}));\n  const active = state.activeStore;\n  const st = state.stores[active];\n  const def = STORE_DEFS[active];\n\n  // Build 30-day window\n  const today = new Date();\n  const days = Array.from({length:30}, (_,i)=>{\n    const d = new Date(today); d.setDate(d.getDate()-(29-i));\n    return d.toISOString().split('T')[0];\n  });\n  const byDate = Object.fromEntries(st.records.map(r=>[r.dateISO||r.date, r]));\n  const netSeries = days.map(d => byDate[d] ? (byDate[d].net||0) : 0);\n  const totalSeries = days.map(d => byDate[d] ? (byDate[d].total||0) : 0);\n\n  // KPIs\n  const todayRec = byDate[todayISO()];\n  const yesterdayRec = byDate[isoOffset(1)];\n  const last7 = days.slice(-7).map(d=>byDate[d]).filter(Boolean);\n  const last30 = days.map(d=>byDate[d]).filter(Boolean);\n  const prev7 = days.slice(-14,-7).map(d=>byDate[d]).filter(Boolean);\n  const net7 = last7.reduce((s,r)=>s+(r.net||0),0);\n  const net30 = last30.reduce((s,r)=>s+(r.net||0),0);\n  const netPrev7 = prev7.reduce((s,r)=>s+(r.net||0),0);\n  const wow = netPrev7 ? Math.round((net7-netPrev7)/Math.abs(netPrev7)*100) : 0;\n  const totalEntries = st.records.length;\n  const targetPct = Math.min(100, Math.round(net30 / Math.max(1,st.target) * 100));\n  const avgDay = last30.length ? Math.round(net30/last30.length) : 0;\n  const todayTotal = todayRec ? todayRec.total||0 : 0;\n  const totalUnits30 = last30.reduce((s,r)=>s+(r.total||0),0);\n  // Stock alert counts\n  const lowOutSet = new Set();\n  st.records.filter(r=>r.dateISO>=isoOffset(14)).forEach(r=>{\n    (r.leftItems||[]).forEach(s=>lowOutSet.add('l:'+s.replace(/\\s*\\(.+\\)$/,'')));\n    (r.outItems||[]).forEach(s=>lowOutSet.add('o:'+s));\n  });\n  const stockAlerts = lowOutSet.size;\n  // Per-store pastel tones (matches accent hue family)\n  const tones = { nmtun:'oklch(78% 0.14 245)', pussorn:'oklch(78% 0.14 25)', khaow:'oklch(82% 0.15 75)' };\n  const tonePink = 'oklch(82% 0.10 350)';\n  const toneGreen = 'oklch(82% 0.12 155)';\n  const tonePurple = 'oklch(82% 0.10 290)';\n  const toneSky = 'oklch(82% 0.10 215)';\n\n  // Recent activity (across all stores)\n  const recent = STORE_IDS.flatMap(id => state.stores[id].records.map(r=>({...r, storeId:id})))\n    .sort((a,b)=>(b.ts||0)-(a.ts||0)).slice(0,7);\n\n  // Stock alerts list\n  const recentLow = {}, recentOut = {};\n  st.records.filter(r=>r.dateISO>=isoOffset(14)).forEach(r=>{\n    (r.leftItems||[]).forEach(s=>{ const n=s.replace(/\\s*\\(.+\\)$/,''); recentLow[n]=(recentLow[n]||0)+1; });\n    (r.outItems||[]).forEach(n=>{ recentOut[n]=(recentOut[n]||0)+1; });\n  });\n  const lowList = Object.entries(recentLow).sort((a,b)=>b[1]-a[1]).slice(0,5);\n  const outList = Object.entries(recentOut).sort((a,b)=>b[1]-a[1]).slice(0,5);\n\n  root.innerHTML = `\n    <div class=\"flex flex-col gap-5 max-w-[1480px]\">\n      <!-- Greeting -->\n      <div class=\"flex items-center justify-between flex-wrap gap-3\">\n        <div>\n          <h2 class=\"text-[24px] md:text-[28px] font-extrabold leading-tight\" style=\"letter-spacing:-.02em;\">สวัสดี · ${def.badge} ${escHtml(def.name)}<\u002Fh2>\n          <p class=\"text-[13.5px] muted mt-1\">${fmtDateLong(todayISO())} · ภาพรวมยอดขายและสต็อก<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"flex gap-2\">\n          <button class=\"btn btn-ghost\" onclick=\"switchView('history')\"><i data-lucide=\"history\"><\u002Fi> ประวัติ<\u002Fbutton>\n          <button class=\"btn btn-primary\" onclick=\"switchView('entry')\"><i data-lucide=\"pencil-line\"><\u002Fi> บันทึกยอด<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- HERO: 4 pastel KPI cards -->\n      <div class=\"grid grid-cols-2 lg:grid-cols-4 gap-3\">\n        ${pastelKpi('ยอดวันนี้', todayRec?fmtMoney(todayRec.net):'—', todayRec?`${fmt(todayTotal)} ${def.salesUnit} · ${todayRec.recorder||'—'}`:'ยังไม่ได้บันทึก', tones[active], 'wallet')}\n        ${pastelKpi('7 วันล่าสุด', fmtMoney(net7), wow!==0?`${wow>0?'↑':'↓'} ${Math.abs(wow)}% เทียบสัปดาห์ก่อน`:`${last7.length} วันบันทึก`, tonePink, 'trending-up')}\n        ${pastelKpi('30 วัน', fmtMoney(net30), `เฉลี่ย ${fmtMoney(avgDay)}/วัน`, toneGreen, 'bar-chart-3')}\n        ${pastelKpi('เป้าเดือน', `${targetPct}%`, `${fmtMoney(net30)} / ${fmtMoney(st.target)}`, tonePurple, 'target', `<div class=\"mt-3 h-1.5 rounded-full bg-white/40 overflow-hidden\"><div class=\"h-full transition-all\" style=\"width:${targetPct}%;background:color-mix(in oklch, ${tonePurple} 85%, black);\"><\u002Fdiv><\u002Fdiv>`)}\n      <\u002Fdiv>\n\n      <!-- Ring stat row -->\n      <div class=\"grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-3\">\n        ${ringStat('ยอดรวม', fmt(totalUnits30), `${def.saleType==='units'?def.salesUnit:'เสิร์ฟ'} · 30 วัน`, Math.min(100, totalUnits30/Math.max(1,totalUnits30+200)*100), 'cup-soda')}\n        ${ringStat('วันที่บันทึก', fmt(last30.length)+'/30', 'อัตราบันทึก', last30.length/30*100, 'calendar-check')}\n        ${ringStat('รายการสต็อก', fmt(stockAlerts), stockAlerts?`ต้องจับตา · 14 วัน`:'ทุกอย่างปกติ', stockAlerts?Math.min(100, stockAlerts*10):0, 'package')}\n        ${ringStat('บันทึกทั้งหมด', fmt(totalEntries), `${st.records.filter(r=>r.synced).length} ส่งแล้ว`, totalEntries?st.records.filter(r=>r.synced).length/totalEntries*100:0, 'database')}\n      <\u002Fdiv>\n\n      <!-- Main chart card -->\n      <div class=\"card p-5\">\n        <div class=\"flex items-start justify-between flex-wrap gap-3 mb-4\">\n          <div>\n            <div class=\"text-[15px] font-semibold\">ยอดสุทธิ 30 วันล่าสุด<\u002Fdiv>\n            <div class=\"text-[12.5px] muted mt-0.5\">เส้น = สุทธิ · แท่ง = ${def.saleType==='units'?'จำนวนแก้ว':'จำนวนเสิร์ฟ'}<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"flex gap-2 text-[12px]\">\n            <span class=\"pill\"><span class=\"dot inline-block w-2 h-2 rounded-full mr-1\" style=\"background:var(--accent)\"><\u002Fspan>สุทธิ<\u002Fspan>\n            <span class=\"pill\"><span class=\"dot inline-block w-2 h-2 rounded-full mr-1\" style=\"background:color-mix(in oklch, var(--accent) 35%, transparent)\"><\u002Fspan>${def.saleType==='units'?'แก้ว':'เสิร์ฟ'}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"height:260px\"><canvas id=\"chart_main\"><\u002Fcanvas><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 2-col -->\n      <div class=\"grid grid-cols-1 lg:grid-cols-3 gap-4\">\n        <!-- Recent activity -->\n        <div class=\"card p-5 lg:col-span-2\">\n          <div class=\"flex items-center justify-between mb-3\">\n            <div class=\"text-[15px] font-semibold\">กิจกรรมล่าสุด<\u002Fdiv>\n            <button class=\"text-[12px] muted hover:underline\" onclick=\"switchView('history')\">ดูทั้งหมด →<\u002Fbutton>\n          <\u002Fdiv>\n          <div class=\"flex flex-col\">\n            ${recent.length===0 ? '<div class=\"muted text-[13px] py-6 text-center\">ยังไม่มีบันทึก<\u002Fdiv>' :\n              recent.map(r => {\n                const d = STORE_DEFS[r.storeId];\n                return `<div class=\"flex items-center gap-3 py-2.5 border-b hairline last:border-0\">\n                  <div class=\"w-8 h-8 rounded-lg flex items-center justify-center text-base\" style=\"background:oklch(95% 0.04 ${d.accentHue});\">${d.badge}<\u002Fdiv>\n                  <div class=\"flex-1 min-w-0\">\n                    <div class=\"flex items-center gap-2\">\n                      <span class=\"font-semibold text-[13.5px] truncate\">${escHtml(d.name)}<\u002Fspan>\n                      ${r.synced?'<span class=\"pill pill-pos\" style=\"padding:1px 7px;font-size:10.5px;\">synced<\u002Fspan>':'<span class=\"pill pill-warn\" style=\"padding:1px 7px;font-size:10.5px;\">รอส่ง<\u002Fspan>'}\n                    <\u002Fdiv>\n                    <div class=\"text-[12px] muted\">${fmtDate(r.dateISO||r.date)} · ${r.recorder||'—'} · ${fmt(r.total)} ${d.salesUnit}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div class=\"text-right num\">\n                    <div class=\"font-semibold text-[14.5px] ${r.net>=0?'':'text-[color:var(--neg)]'}\">${fmtMoney(r.net)}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>`;\n              }).join('')\n            }\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Stock alerts -->\n        <div class=\"card p-5\">\n          <div class=\"text-[15px] font-semibold mb-3\">แจ้งเตือนสต็อก <span class=\"muted text-[12px] font-normal\">· 14 วัน<\u002Fspan><\u002Fdiv>\n          ${outList.length===0 && lowList.length===0 ? '<div class=\"muted text-[13px] py-4 text-center\">ทุกอย่างปกติ ✨<\u002Fdiv>' : ''}\n          ${outList.length ? `<div class=\"text-[11px] font-semibold muted-2 tracking-widest mb-2\">หมดบ่อย<\u002Fdiv>\n            <div class=\"flex flex-col gap-1.5 mb-3\">${outList.map(([n,c])=>`<div class=\"flex items-center justify-between text-[13px]\">\n              <span class=\"truncate\">${escHtml(n)}<\u002Fspan>\n              <span class=\"pill pill-neg\">${c}×<\u002Fspan><\u002Fdiv>`).join('')}<\u002Fdiv>`:''}\n          ${lowList.length ? `<div class=\"text-[11px] font-semibold muted-2 tracking-widest mb-2\">เหลือบ่อย<\u002Fdiv>\n            <div class=\"flex flex-col gap-1.5\">${lowList.map(([n,c])=>`<div class=\"flex items-center justify-between text-[13px]\">\n              <span class=\"truncate\">${escHtml(n)}<\u002Fspan>\n              <span class=\"pill pill-warn\">${c}×<\u002Fspan><\u002Fdiv>`).join('')}<\u002Fdiv>`:''}\n          <button class=\"btn btn-ghost w-full mt-4 text-[12px]\" onclick=\"switchView('stock')\"><i data-lucide=\"arrow-right\"><\u002Fi> ดูสต็อกทั้งหมด<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- All-stores comparison -->\n      <div class=\"card p-5\">\n        <div class=\"flex items-center justify-between mb-4\">\n          <div>\n            <div class=\"text-[15px] font-semibold\">เปรียบเทียบทั้ง 3 ร้าน <span class=\"muted text-[12px] font-normal\">· 30 วัน<\u002Fspan><\u002Fdiv>\n            <div class=\"text-[12.5px] muted mt-0.5\">สลับร้านได้ที่แถบด้านซ้าย<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"grid grid-cols-1 md:grid-cols-3 gap-3\">\n          ${allStores.map(({id,def,state:ss}) => {\n            const dates30 = days.slice();\n            const byD = Object.fromEntries(ss.records.map(r=>[r.dateISO||r.date, r]));\n            const ser = dates30.map(d => byD[d]?byD[d].net||0:0);\n            const sum = ser.reduce((s,v)=>s+v,0);\n            const tx = ser.filter(v=>v).length;\n            const pct = Math.min(100, Math.round(sum/Math.max(1,ss.target)*100));\n            const isActive = id===active;\n            return `<button class=\"card-flat p-4 text-left transition-all hover:shadow-md\" onclick=\"switchStore('${id}')\" style=\"${isActive?`border-color:oklch(${state.theme==='dark'?72:60}% 0.16 ${def.accentHue});box-shadow:0 0 0 1px oklch(${state.theme==='dark'?72:60}% 0.16 ${def.accentHue}) inset;`:''}\">\n              <div class=\"flex items-center justify-between mb-2\">\n                <div class=\"flex items-center gap-2\">\n                  <span class=\"text-lg\">${def.badge}<\u002Fspan>\n                  <span class=\"font-semibold text-[14px]\">${escHtml(def.name)}<\u002Fspan>\n                <\u002Fdiv>\n                ${isActive?'<i data-lucide=\"circle-dot\" style=\"color:oklch('+(state.theme==='dark'?72:60)+'% 0.16 '+def.accentHue+')\"><\u002Fi>':''}\n              <\u002Fdiv>\n              <div class=\"text-[22px] font-bold num\">${fmtMoney(sum)}<\u002Fdiv>\n              <div class=\"text-[11.5px] muted mb-2\">${tx} วัน · เป้า ${fmtMoney(ss.target)} (${pct}%)<\u002Fdiv>\n              <canvas data-spark=\"${id}\" class=\"spark\"><\u002Fcanvas>\n            <\u002Fbutton>`;\n          }).join('')}\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `;\n\n  // Charts\n  setTimeout(()=>{\n    drawMainChart(days, netSeries, totalSeries, def);\n    allStores.forEach(({id, def:d, state:ss}) => {\n      const c = document.querySelector(`canvas[data-spark=\"${id}\"]`);\n      if(c) drawSpark(c, days.map(dd=>{ const r=ss.records.find(r=>(r.dateISO||r.date)===dd); return r?r.net||0:0; }), d.accentHue);\n    });\n  },10);\n}\n\nfunction kpiCard(label, value, sub, kind, icon, extra=''){\n  const cls = kind==='pos'?'text-[color:var(--pos)]':kind==='neg'?'text-[color:var(--neg)]':'';\n  return `<div class=\"card p-4\">\n    <div class=\"flex items-center justify-between mb-1.5\">\n      <div class=\"text-[12px] muted font-medium\">${label}<\u002Fdiv>\n      <i data-lucide=\"${icon}\" class=\"muted-2\" style=\"width:14px;height:14px\"><\u002Fi>\n    <\u002Fdiv>\n    <div class=\"text-[22px] font-bold num ${cls}\">${value}<\u002Fdiv>\n    <div class=\"text-[11.5px] muted mt-0.5\">${sub}<\u002Fdiv>\n    ${extra}\n  <\u002Fdiv>`;\n}\n\nfunction pastelKpi(label, value, sub, tone, icon, extra=''){\n  return `<div class=\"pkpi\" style=\"--p-tone:${tone};\">\n    <div class=\"pkpi-eyebrow\">${label}<\u002Fdiv>\n    <div class=\"text-[28px] md:text-[30px] font-extrabold num mt-2.5\" style=\"letter-spacing:-.02em;color:color-mix(in oklch, ${tone} 85%, black);\">${value}<\u002Fdiv>\n    <div class=\"text-[12px] mt-1 font-medium\" style=\"color:color-mix(in oklch, ${tone} 60%, black);opacity:.85;\">${sub}<\u002Fdiv>\n    ${extra}\n    <div class=\"pkpi-ic\"><i data-lucide=\"${icon}\"><\u002Fi><\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction ringStat(label, value, sub, pct, icon){\n  pct = Math.max(0, Math.min(100, pct||0));\n  const r = 28, C = 2*Math.PI*r;\n  const off = C * (1 - pct/100);\n  return `<div class=\"ring-card\">\n    <div class=\"min-w-0 flex-1\">\n      <div class=\"text-[12px] muted font-medium\">${label}<\u002Fdiv>\n      <div class=\"text-[24px] font-extrabold num mt-1\" style=\"letter-spacing:-.015em;\">${value}<\u002Fdiv>\n      <div class=\"text-[11.5px] muted-2 mt-0.5 truncate\">${sub}<\u002Fdiv>\n    <\u002Fdiv>\n    <svg class=\"ring-svg\" viewBox=\"0 0 64 64\">\n      <defs>\n        <linearGradient id=\"rg-${icon}\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\">\n          <stop offset=\"0%\" stop-color=\"var(--accent)\"/>\n          <stop offset=\"100%\" stop-color=\"color-mix(in oklch, var(--accent) 60%, oklch(80% 0.18 320))\"/>\n        <\u002FlinearGradient>\n      <\u002Fdefs>\n      <circle class=\"ring-bg\" cx=\"32\" cy=\"32\" r=\"${r}\" fill=\"none\" stroke-width=\"5\"/>\n      <circle cx=\"32\" cy=\"32\" r=\"${r}\" fill=\"none\" stroke=\"url(#rg-${icon})\" stroke-width=\"5\" stroke-linecap=\"round\"\n        stroke-dasharray=\"${C}\" stroke-dashoffset=\"${off}\" transform=\"rotate(-90 32 32)\"/>\n      <foreignObject x=\"20\" y=\"20\" width=\"24\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display:flex;align-items:center;justify-content:center;width:100%;height:100%;color:var(--accent);\"><i data-lucide=\"${icon}\" style=\"width:16px;height:16px\"><\u002Fi><\u002Fdiv><\u002FforeignObject>\n    <\u002Fsvg>\n  <\u002Fdiv>`;\n}\n\nlet chartMain;\nfunction drawMainChart(days, netSeries, totalSeries, def){\n  const ctx = document.getElementById('chart_main');\n  if(!ctx) return;\n  if(chartMain) chartMain.destroy();\n  const cs = getComputedStyle(document.documentElement);\n  const accent = cs.getPropertyValue('--accent').trim();\n  const accentSoft = cs.getPropertyValue('--accent-soft').trim();\n  const text2 = cs.getPropertyValue('--text-2').trim();\n  const border = cs.getPropertyValue('--border').trim();\n\n  chartMain = new Chart(ctx, {\n    type: 'bar',\n    data: {\n      labels: days.map(d=>fmtDate(d).slice(0,5)),\n      datasets: [\n        { type:'bar', label: def.saleType==='units'?'แก้ว':'เสิร์ฟ', data: totalSeries, backgroundColor: accentSoft, borderColor:'transparent', borderRadius:6, yAxisID:'y2', barPercentage:.55, categoryPercentage:.78 },\n        { type:'line', label:'สุทธิ', data: netSeries, borderColor: accent, backgroundColor:'transparent', borderWidth:2.5, tension:.38, pointRadius:0, pointHoverRadius:6, pointHoverBackgroundColor:accent, pointHoverBorderColor:'#fff', pointHoverBorderWidth:2, yAxisID:'y' }\n      ]\n    },\n    options: {\n      responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},\n      plugins:{\n        legend:{display:false},\n        tooltip:{\n          backgroundColor:'rgba(15,15,15,.95)', padding:11, cornerRadius:10, displayColors:true,\n          titleFont:{family:'Sarabun',weight:'600',size:12}, bodyFont:{family:'Sarabun',size:12},\n          callbacks:{ label: ctx => ` ${ctx.dataset.label}: ${ctx.dataset.yAxisID==='y'?fmtMoney(ctx.parsed.y):fmt(ctx.parsed.y)}` }\n        }\n      },\n      scales:{\n        x:{ grid:{display:false,drawBorder:false}, ticks:{ color:text2, font:{family:'Sarabun',size:10.5}, maxRotation:0, autoSkipPadding:20 } },\n        y:{ position:'left', beginAtZero:true, grid:{color:border, drawBorder:false}, ticks:{ color:text2, font:{family:'Sarabun',size:10.5}, maxTicksLimit:5, callback:v=> v>=1000?'฿'+(v/1000).toFixed(0)+'k':'฿'+v } },\n        y2:{ position:'right', beginAtZero:true, grid:{display:false,drawBorder:false}, ticks:{ color:text2, font:{family:'Sarabun',size:10.5}, maxTicksLimit:5 } }\n      }\n    }\n  });\n}\n\nfunction drawSpark(canvas, data, hue){\n  const ctx = canvas.getContext('2d');\n  const w = canvas.width = canvas.offsetWidth * 2;\n  const h = canvas.height = 46 * 2;\n  canvas.style.height='46px';\n  ctx.scale(1,1);\n  const max = Math.max(1, ...data.map(d=>Math.abs(d)));\n  const dark = state.theme==='dark';\n  const accent = `oklch(${dark?72:60}% 0.16 ${hue})`;\n  const accSoft = `oklch(${dark?72:60}% 0.16 ${hue} / .18)`;\n  // Area path\n  ctx.beginPath();\n  data.forEach((v,i)=>{\n    const x = i/(data.length-1) * w;\n    const y = h - (v/max)*0.85*h - h*0.075;\n    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);\n  });\n  ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();\n  ctx.fillStyle = accSoft;\n  ctx.fill();\n  // Line\n  ctx.beginPath();\n  data.forEach((v,i)=>{\n    const x = i/(data.length-1) * w;\n    const y = h - (v/max)*0.85*h - h*0.075;\n    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);\n  });\n  ctx.strokeStyle = accent;\n  ctx.lineWidth = 3.5;\n  ctx.lineJoin = 'round';\n  ctx.lineCap = 'round';\n  ctx.stroke();\n}\n<\u002Fscript>\n\n<!-- ============================================================== -->\n<!-- VIEW: ENTRY (บันทึกยอดขาย)                                       -->\n<!-- ============================================================== -->\n<script>\nfunction renderEntry(root){\n  const id = state.activeStore;\n  const def = STORE_DEFS[id];\n  const st = state.stores[id];\n  const D = state.formDraft;\n\n  // Initialize draft date if empty\n  if(!D.date){ D.date = todayISO(); }\n\n  // Group fields by section for nmtun (cash/units), else (sale/cost/boxegg)\n  const saleGroups = {};\n  st.sale.forEach(f => { const s=f.section||'sale'; (saleGroups[s]=saleGroups[s]||[]).push(f); });\n\n  const html = `\n    <div class=\"max-w-[920px] flex flex-col gap-4\">\n\n      <!-- Basic info -->\n      <div class=\"card p-5\">\n        <div class=\"flex items-center justify-between mb-3\">\n          <div class=\"flex items-center gap-2\">\n            <i data-lucide=\"calendar\"><\u002Fi>\n            <span class=\"font-semibold text-[14.5px]\">ข้อมูลพื้นฐาน<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"grid grid-cols-1 md:grid-cols-3 gap-3\">\n          ${st.basic.map(f => fieldEl(f, D[f.key])).join('')}\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      ${def.saleType==='units' ? renderCashSection(st, D, def) : renderSaleSection(st, D, def, saleGroups)}\n      ${def.saleType==='units' ? renderUnitsSection(st, D, def, saleGroups) : ''}\n      ${st.cost.length ? renderCostSection(st, D) : ''}\n      ${def.hasBoxEgg ? renderBoxEggSection(st, D) : ''}\n\n      <!-- Stock -->\n      <div class=\"card p-5\">\n        <div class=\"flex items-center justify-between mb-3\">\n          <div class=\"flex items-center gap-2\">\n            <i data-lucide=\"package\"><\u002Fi>\n            <span class=\"font-semibold text-[14.5px]\">สถานะสต็อก<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"flex gap-2 text-[11.5px]\">\n            <span class=\"inline-flex items-center gap-1.5 muted\"><span class=\"inline-block w-2 h-2 rounded-full\" style=\"background:var(--text-3)\"><\u002Fspan>ปกติ<\u002Fspan>\n            <span class=\"inline-flex items-center gap-1.5 muted\"><span class=\"inline-block w-2 h-2 rounded-full\" style=\"background:oklch(70% 0.16 75)\"><\u002Fspan>เหลือ<\u002Fspan>\n            <span class=\"inline-flex items-center gap-1.5 muted\"><span class=\"inline-block w-2 h-2 rounded-full\" style=\"background:oklch(60% 0.20 25)\"><\u002Fspan>หมด<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"text-[11.5px] muted mb-3\">คลิก 1× = เหลือ (กรอกจำนวน) · คลิก 2× = หมด · คลิก 3× = ปกติ<\u002Fdiv>\n        <div id=\"inv_area\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Note -->\n      <div class=\"card p-5\">\n        <div class=\"flex items-center gap-2 mb-3\">\n          <i data-lucide=\"message-square-text\"><\u002Fi>\n          <span class=\"font-semibold text-[14.5px]\">หมายเหตุ<\u002Fspan>\n        <\u002Fdiv>\n        <textarea id=\"inp_note\" class=\"inp\" rows=\"2\" placeholder=\"ข้อมูลเพิ่มเติม...\">${escHtml(D.note||'')}<\u002Ftextarea>\n      <\u002Fdiv>\n\n      <!-- Net summary + Save -->\n      <div class=\"card p-5\" style=\"background:var(--accent-soft);border-color:color-mix(in oklch, var(--accent) 30%, transparent);\">\n        <div class=\"grid grid-cols-2 gap-4\">\n          <div>\n            <div class=\"text-[11.5px] font-semibold tracking-widest muted-2\">เงินสดสุทธิ<\u002Fdiv>\n            <div id=\"net_val\" class=\"text-[28px] font-extrabold num text-accent-ink\">฿0<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div class=\"text-[11.5px] font-semibold tracking-widest muted-2\">ยอด${def.saleType==='units'?'รวมแก้ว':'เสิร์ฟ'}<\u002Fdiv>\n            <div id=\"total_val\" class=\"text-[28px] font-extrabold num text-accent-ink\">0 ${def.salesUnit}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"flex gap-2 sticky bottom-4\">\n        <button class=\"btn btn-primary flex-1\" onclick=\"saveEntry()\" id=\"save_btn\"><i data-lucide=\"check-circle-2\"><\u002Fi> บันทึก + ส่ง LINE & Sheets<\u002Fbutton>\n        <button class=\"btn btn-ghost\" onclick=\"clearForm()\"><i data-lucide=\"rotate-ccw\"><\u002Fi> ล้าง<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `;\n  root.innerHTML = html;\n\n  // Bind inputs\n  bindEntryInputs();\n  // Render dynamic costs if applicable\n  if(def.hasDynCosts){ renderDynCosts(); }\n  renderInventoryArea();\n  recalcEntry();\n}\n\nfunction fieldEl(f, val){\n  const isDate = f.type==='date';\n  const v = val ?? (isDate ? todayISO() : '');\n  return `<div class=\"flex flex-col gap-1.5\">\n    <label class=\"lbl\">${escHtml(f.label)}${f.req?'<span class=\"req\">*<\u002Fspan>':''}${f.sub?`<span class=\"sub\">${escHtml(f.sub)}<\u002Fspan>`:''}<\u002Flabel>\n    <input class=\"inp\" type=\"${f.type}\" id=\"inp_${f.id}\" data-key=\"${f.key}\" placeholder=\"${escHtml(f.ph||'')}\" value=\"${escHtml(v)}\" ${f.req?'required':''} ${f.type==='number'?'min=\"0\" inputmode=\"decimal\"':''}>\n  <\u002Fdiv>`;\n}\n\nfunction renderCashSection(st, D, def){\n  const cashFlds = st.sale.filter(f=>f.section==='cash');\n  return `<div class=\"card p-5\">\n    <div class=\"flex items-center gap-2 mb-3\">\n      <i data-lucide=\"banknote\"><\u002Fi>\n      <span class=\"font-semibold text-[14.5px]\">เงินสด<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"grid grid-cols-1 md:grid-cols-3 gap-3 mb-3\">\n      ${cashFlds.map(f=>fieldEl(f, D[f.key])).join('')}\n    <\u002Fdiv>\n    ${def.hasDynCosts ? `\n      <div class=\"border-t hairline pt-3 mt-3\">\n        <div class=\"text-[12.5px] font-semibold muted mb-2\">💸 ค่าใช้จ่ายอื่นๆ (ระบุรายการ)<\u002Fdiv>\n        <div id=\"dyn_costs\" class=\"flex flex-col gap-2 mb-2\"><\u002Fdiv>\n        <button class=\"btn btn-soft text-[12.5px]\" onclick=\"addDynCost()\"><i data-lucide=\"plus\"><\u002Fi> เพิ่มรายการ<\u002Fbutton>\n      <\u002Fdiv>\n    `:''}\n  <\u002Fdiv>`;\n}\n\nfunction renderSaleSection(st, D, def, groups){\n  const fields = st.sale.filter(f=>!f.section || f.section==='sale');\n  return `<div class=\"card p-5\">\n    <div class=\"flex items-center gap-2 mb-3\">\n      <i data-lucide=\"trending-up\"><\u002Fi>\n      <span class=\"font-semibold text-[14.5px]\">ยอดขาย<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"grid grid-cols-1 md:grid-cols-3 gap-3\">\n      ${fields.map(f => {\n        const tag = f.role==='plus' ? `<span class=\"pill pill-pos\" style=\"font-size:10px;padding:1px 6px;\">+<\u002Fspan>` :\n                    f.role==='minus' ? `<span class=\"pill pill-neg\" style=\"font-size:10px;padding:1px 6px;\">−<\u002Fspan>` : '';\n        return `<div class=\"flex flex-col gap-1.5\">\n          <label class=\"lbl\">${escHtml(f.label)} ${tag}${f.req?'<span class=\"req\">*<\u002Fspan>':''}${f.sub?`<span class=\"sub\">${escHtml(f.sub)}<\u002Fspan>`:''}<\u002Flabel>\n          <input class=\"inp\" type=\"number\" min=\"0\" inputmode=\"decimal\" id=\"inp_${f.id}\" data-key=\"${f.key}\" placeholder=\"${escHtml(f.ph||'0')}\" value=\"${escHtml(D[f.key]||'')}\" ${f.req?'required':''}>\n        <\u002Fdiv>`;\n      }).join('')}\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction renderUnitsSection(st, D, def, groups){\n  const fields = st.sale.filter(f=>f.section==='units');\n  return `<div class=\"card p-5\">\n    <div class=\"flex items-center gap-2 mb-3\">\n      <i data-lucide=\"cup-soda\"><\u002Fi>\n      <span class=\"font-semibold text-[14.5px]\">ยอดขาย<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"grid grid-cols-2 md:grid-cols-4 gap-3\">\n      ${fields.map(f => `<div class=\"flex flex-col gap-1.5\">\n        <label class=\"lbl\">${escHtml(f.label)}${f.sub?`<span class=\"sub\">${escHtml(f.sub)}<\u002Fspan>`:''}<\u002Flabel>\n        <input class=\"inp\" type=\"number\" min=\"0\" inputmode=\"decimal\" id=\"inp_${f.id}\" data-key=\"${f.key}\" placeholder=\"0\" value=\"${escHtml(D[f.key]||'')}\">\n      <\u002Fdiv>`).join('')}\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction renderCostSection(st, D){\n  return `<div class=\"card p-5\">\n    <div class=\"flex items-center gap-2 mb-3\">\n      <i data-lucide=\"minus-circle\"><\u002Fi>\n      <span class=\"font-semibold text-[14.5px]\">ค่าใช้จ่
