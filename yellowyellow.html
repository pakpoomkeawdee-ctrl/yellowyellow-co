<!doctype html>
<html lang="th" class="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>yellowyellow.co — แดชบอร์ดผู้บริหาร</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&family=JetBrains+Mono:wght@500;700&display=swap">
<link rel="stylesheet" href="assets/styles.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      fontFamily: {
        sans:    ['Sarabun', 'ui-sans-serif', 'system-ui', 'sans-serif'],
        display: ['Kanit', 'Sarabun', 'system-ui', 'sans-serif'],
        num:     ['"Plus Jakarta Sans"', 'Sarabun', 'system-ui', 'sans-serif'],
        mono:    ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
      },
    },
  },
};
</script>
<style>
  /* ===== Admin-specific tokens (override shared) ===== */
  :root {
    --accent: oklch(60% 0.16 245);
    --accent-soft: oklch(95% 0.04 245);
    --accent-ink:  oklch(40% 0.18 245);
    --pos: oklch(58% 0.15 155);
    --neg: oklch(58% 0.20 25);
    --warn: oklch(72% 0.16 70);
    --shadow-card: 0 1px 0 0 rgba(0,0,0,.02), 0 1px 3px 0 rgba(0,0,0,.04);
    --shadow-pop:  0 12px 32px -8px rgba(0,0,0,.16), 0 4px 12px -4px rgba(0,0,0,.06);
  }
  .dark {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface-2: #181818;
    --border: #232323;
    --border-strong: #2e2e2e;
    --text: #f5f5f4;
    --text-2: #a8a29e;
    --muted: #57534e;
    --accent: oklch(72% 0.15 245);
    --accent-soft: oklch(28% 0.07 245);
    --accent-ink:  oklch(85% 0.10 245);
    --shadow-card: 0 1px 0 0 rgba(255,255,255,.02), 0 1px 3px 0 rgba(0,0,0,.4);
    --shadow-pop:  0 12px 32px -8px rgba(0,0,0,.6);
  }
  body { font-feature-settings: 'ss01', 'cv11'; }
  h1, h2, h3, h4, .pkpi-eyebrow, .lbl, .nav-item { word-break: keep-all; }
  .pill, .ic-chip { white-space: nowrap; word-break: keep-all; }

  .card        { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow-card); }
  .card-flat   { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; }
  .hairline    { border-color: var(--border); }
  .muted       { color: var(--text-2); }
  .muted-2     { color: var(--muted); }
  .surface-2   { background: var(--surface-2); }
  .accent      { color: var(--accent); }
  .bg-accent       { background: var(--accent); }
  .bg-accent-soft  { background: var(--accent-soft); }
  .text-accent-ink { color: var(--accent-ink); }

  .inp {
    width: 100%; padding: 9px 12px; border: 1px solid var(--border-strong); border-radius: 10px;
    background: var(--surface); color: var(--text); font: inherit; font-size: 14px; outline: none;
    transition: border-color .12s, box-shadow .12s;
  }
  .inp::placeholder { color: var(--muted); }
  .inp:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 18%, transparent); }
  .lbl { font-size: 12.5px; font-weight: 600; color: var(--text-2); display: flex; align-items: center; gap: 6px; }
  .lbl .req { color: var(--neg); }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 14px; border-radius: 10px; font: inherit; font-size: 13.5px; font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: all .12s; white-space: nowrap; line-height: 1; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover:not(:disabled) { filter: brightness(1.08); }
  .btn-ghost   { background: transparent; color: var(--text); border-color: var(--border-strong); }
  .btn-ghost:hover { background: var(--surface-2); }
  .btn-soft    { background: var(--accent-soft); color: var(--accent-ink); }
  .btn-soft:hover { filter: brightness(.97); }
  .btn-danger  { background: transparent; color: var(--neg); border: 1px solid color-mix(in oklch, var(--neg) 35%, transparent); }
  .btn-danger:hover { background: color-mix(in oklch, var(--neg) 10%, transparent); }
  .btn-icon { width: 34px; height: 34px; padding: 0; border-radius: 10px; color: var(--text-2); }
  .btn-icon:hover { background: var(--surface-2); color: var(--text); }

  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 10px; cursor: pointer; color: var(--text-2); font-weight: 500; font-size: 14px; transition: all .12s; white-space: nowrap; }
  .nav-item:hover { background: var(--surface-2); color: var(--text); }
  .nav-item.active { background: var(--accent-soft); color: var(--accent-ink); font-weight: 600; }

  .pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 999px; font-size: 11.5px; font-weight: 600; border: 1px solid var(--border); background: var(--surface); color: var(--text-2); }
  .pill-pos  { color: oklch(45% 0.15 155); background: oklch(96% 0.04 155); border-color: oklch(85% 0.07 155); }
  .pill-neg  { color: oklch(45% 0.18 25);  background: oklch(96% 0.04 25);  border-color: oklch(85% 0.07 25); }
  .pill-warn { color: oklch(45% 0.14 70);  background: oklch(96% 0.04 70);  border-color: oklch(85% 0.07 70); }
  .pill-accent { color: var(--accent-ink); background: var(--accent-soft); border-color: color-mix(in oklch, var(--accent) 30%, transparent); }
  .dark .pill-pos  { color: oklch(80% 0.15 155); background: oklch(22% 0.06 155); border-color: oklch(30% 0.07 155); }
  .dark .pill-neg  { color: oklch(80% 0.15 25);  background: oklch(22% 0.06 25);  border-color: oklch(30% 0.07 25); }
  .dark .pill-warn { color: oklch(85% 0.14 70);  background: oklch(22% 0.06 70);  border-color: oklch(30% 0.07 70); }

  .ic-chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 999px; font-size: 13px; font-weight: 500; cursor: pointer; user-select: none; border: 1px solid var(--border-strong); background: var(--surface); color: var(--text); transition: all .14s; }
  .ic-chip:hover { transform: translateY(-1px); box-shadow: var(--shadow-card); }
  .ic-chip .dot { width: 7px; height: 7px; border-radius: 999px; background: var(--muted); }
  .ic-chip.low  { background: oklch(97% 0.05 75); border-color: oklch(70% 0.16 75); color: oklch(40% 0.14 70); }
  .ic-chip.low .dot  { background: oklch(70% 0.16 75); }
  .ic-chip.out  { background: oklch(96% 0.04 25); border-color: oklch(75% 0.16 25); color: oklch(45% 0.18 25); text-decoration: line-through; }
  .ic-chip.out .dot  { background: oklch(60% 0.20 25); }
  .dark .ic-chip.low { background: oklch(28% 0.08 70); color: oklch(82% 0.13 70); }
  .dark .ic-chip.out { background: oklch(28% 0.08 25); color: oklch(82% 0.13 25); }

  table.tbl { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; }
  .tbl th { text-align: left; padding: 10px 12px; background: var(--surface-2); color: var(--text-2); font-weight: 600; font-size: 11.5px; text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid var(--border); white-space: nowrap; position: sticky; top: 0; }
  .tbl td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .tbl tr:hover td { background: var(--surface-2); }
  .tbl tr:last-child td { border-bottom: none; }

  .spin { display: inline-block; width: 13px; height: 13px; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; animation: sp .8s linear infinite; opacity: .7; vertical-align: middle; }
  @keyframes sp { to { transform: rotate(360deg); } }

  .app-grid { display: grid; grid-template-columns: 264px 1fr; min-height: 100vh; }
  aside.side { transition: transform .25s ease; background: var(--surface); border-right: 1px solid var(--border); }
  @media (max-width: 900px) {
    .app-grid { grid-template-columns: 1fr; }
    aside.side { position: fixed; inset: 0 auto 0 0; width: 280px; z-index: 50; transform: translateX(-100%); box-shadow: var(--shadow-pop); }
    aside.side.mobile-open { transform: translateX(0); }
    .mobile-tabs { display: flex !important; }
    .mobile-backdrop.show { display: block !important; }
  }
  .mobile-tabs { display: none; }
  .mobile-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 40; }

  /* Pastel KPI cards */
  .pkpi {
    position: relative; border-radius: 20px; padding: 22px 24px;
    border: 1px solid color-mix(in oklch, var(--p-tone) 25%, transparent);
    background: linear-gradient(135deg, color-mix(in oklch, var(--p-tone) 22%, var(--surface)) 0%, color-mix(in oklch, var(--p-tone) 8%, var(--surface)) 100%);
    transition: transform .25s cubic-bezier(.2,.7,.2,1), box-shadow .25s;
    overflow: hidden;
  }
  .pkpi:hover { transform: translateY(-3px); box-shadow: 0 18px 40px -16px color-mix(in oklch, var(--p-tone) 45%, transparent); }
  .pkpi-eyebrow { color: color-mix(in oklch, var(--p-tone) 75%, black); font-weight: 700; font-size: 12.5px; letter-spacing: .04em; text-transform: uppercase; }
  .pkpi-value { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 30px; font-weight: 800; letter-spacing: -.025em; margin-top: 4px; color: var(--text); }
  .pkpi-sub { font-size: 12.5px; color: var(--text-2); margin-top: 4px; }
  .pkpi-ic {
    position: absolute; right: 18px; top: 18px;
    width: 48px; height: 48px; border-radius: 14px;
    display: grid; place-items: center; font-size: 22px;
    background: color-mix(in oklch, var(--p-tone) 30%, var(--surface));
    color: color-mix(in oklch, var(--p-tone) 80%, black);
  }
  .dark .pkpi { background: linear-gradient(135deg, color-mix(in oklch, var(--p-tone) 32%, var(--surface)) 0%, color-mix(in oklch, var(--p-tone) 12%, var(--surface)) 100%); }
  .dark .pkpi-eyebrow { color: color-mix(in oklch, var(--p-tone) 85%, white); }

  /* Topbar */
  .nav-search {
    display: flex; align-items: center; gap: 10px; padding: 9px 16px;
    background: var(--surface-2); border: 1px solid transparent; border-radius: 999px;
    color: var(--text-2); transition: all .15s; min-width: 280px;
  }
  .nav-search input { background: transparent; border: none; outline: none; font: inherit; color: var(--text); width: 100%; }
  .nav-bell { position: relative; width: 38px; height: 38px; border-radius: 999px; background: var(--surface-2); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background .15s; color: var(--text-2); }
  .nav-bell:hover { background: var(--border); color: var(--text); }
  .nav-bell-badge { position: absolute; top: -2px; right: -2px; min-width: 18px; height: 18px; border-radius: 999px; background: var(--neg); color: #fff; font-size: 10.5px; font-weight: 700; display: flex; align-items: center; justify-content: center; padding: 0 5px; border: 2px solid var(--bg); }
  .nav-user { display: flex; align-items: center; gap: 10px; padding: 4px 10px 4px 4px; border-radius: 999px; cursor: pointer; transition: background .15s; }
  .nav-user:hover { background: var(--surface-2); }
  .nav-avatar { width: 36px; height: 36px; border-radius: 999px; background: linear-gradient(135deg, var(--accent), color-mix(in oklch, var(--accent) 70%, oklch(80% 0.18 320))); color: #fff; font-weight: 700; display: flex; align-items: center; justify-content: center; font-size: 14px; }

  .switch { position: relative; width: 38px; height: 22px; background: var(--border-strong); border-radius: 999px; cursor: pointer; transition: background .15s; flex-shrink: 0; }
  .switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: #fff; border-radius: 999px; transition: transform .18s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
  .switch.on { background: var(--accent); }
  .switch.on::after { transform: translateX(16px); }

  .modal-bd { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none; align-items: flex-start; justify-content: center; padding: 40px 16px; z-index: 150; overflow-y: auto; }
  .modal-bd.show { display: flex; }
  .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; width: 100%; max-width: 560px; box-shadow: var(--shadow-pop); }

  .kpi-trend { font-size: 11.5px; font-weight: 600; padding: 2px 6px; border-radius: 6px; display: inline-flex; align-items: center; gap: 3px; }
  .kpi-trend.up   { color: oklch(45% 0.15 155); background: oklch(95% 0.04 155); }
  .kpi-trend.down { color: oklch(45% 0.18 25);  background: oklch(95% 0.04 25); }

  .num { font-variant-numeric: tabular-nums; letter-spacing: -.01em; }
  .mono { font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body class="antialiased">

<div class="app-grid">

  <!-- ============== SIDEBAR ============== -->
  <aside class="side px-4 py-5 flex flex-col">
    <div class="flex items-center gap-2 px-2 mb-6">
      <div class="w-9 h-9 rounded-xl flex items-center justify-center text-white font-extrabold tracking-tighter" style="background:linear-gradient(135deg, oklch(30% 0.05 240), oklch(20% 0.04 240))">yy</div>
      <div>
        <div class="font-bold text-[15px] leading-tight font-display">yellowyellow<span class="muted">.co</span></div>
        <div class="text-[11px] muted-2 mt-0.5">หลังบ้านธุรกิจ</div>
      </div>
    </div>

    <!-- Store switcher -->
    <div class="mb-5">
      <div class="text-[10.5px] font-semibold muted-2 tracking-widest px-2 mb-2">ร้านค้า</div>
      <div id="store_switcher" class="flex flex-col gap-1"></div>
    </div>

    <!-- View nav -->
    <nav id="view_nav" class="flex flex-col gap-0.5 flex-1"></nav>

    <div class="mt-auto pt-4 border-t hairline">
      <a class="nav-item" href="index.html">
        <span style="font-size:18px">🛒</span>
        <span class="flex-1">เปิดหน้าร้าน (POS)</span>
        <span style="opacity:.5">↗</span>
      </a>
      <div class="flex items-center justify-between px-2 mt-3">
        <div class="flex items-center gap-2">
          <span style="font-size:16px">🌙</span>
          <span class="text-[13px] muted">โหมดมืด</span>
        </div>
        <div id="theme_toggle" class="switch"></div>
      </div>
      <div class="text-[10.5px] muted-2 mt-3 px-2 leading-relaxed">
        v1.0 · Google Sheets sync · ทุก 30 วิ
      </div>
    </div>
  </aside>

  <div class="mobile-backdrop" id="mb_bd"></div>

  <!-- ============== MAIN ============== -->
  <main class="flex flex-col" style="min-width:0;">

    <header class="px-5 md:px-8 py-3.5 border-b hairline flex items-center gap-3 sticky top-0 z-20" style="background:color-mix(in oklch, var(--bg) 85%, transparent);backdrop-filter:blur(12px);">
      <button class="btn btn-icon md:hidden" id="btn_sidebar" title="เมนู">≡</button>
      <label class="nav-search flex-1 max-w-md">
        <span style="font-size:14px">🔍</span>
        <input id="topbar_search" placeholder="ค้นหา หน้า / ร้าน / รายการ...">
      </label>
      <div class="flex items-center gap-2 ml-auto">
        <span id="topbar_hook" class="pill hidden lg:inline-flex" style="cursor:pointer">⚙️ ตั้งค่า API</span>
        <button class="nav-bell" id="btn_alerts" title="แจ้งเตือนสต็อก">
          🔔
          <span class="nav-bell-badge" id="alert_badge" style="display:none">0</span>
        </button>
        <div class="nav-user" id="user_chip">
          <div class="nav-avatar" id="nav_avatar">yy</div>
          <div class="hidden lg:block leading-tight">
            <div class="font-semibold text-[13px]" id="nav_user_role">Admin</div>
            <div class="text-[11px] muted-2" id="nav_user_sub">workspace</div>
          </div>
        </div>
        <button id="btn_logout" class="pill" title="ออกจากระบบ" style="cursor:pointer;border:1px solid var(--border);padding:6px 12px;">⏻ ออก</button>
      </div>
    </header>

    <div id="view" class="flex-1 px-5 md:px-8 py-6 md:py-8 pb-24 md:pb-8" style="min-height:0;"></div>

    <nav class="mobile-tabs fixed bottom-0 left-0 right-0 border-t hairline px-2 py-1.5 z-30" style="background:color-mix(in oklch, var(--bg) 90%, transparent);backdrop-filter:blur(12px);">
      <div id="mobile_tabs" class="flex justify-around"></div>
    </nav>
  </main>
</div>

<!-- Toast -->
<div class="yy-toast" id="yy-toast"><span id="yy-toast-msg">—</span></div>

<!-- Offline -->
<div class="yy-offline" id="yy-offline">⚠ ออฟไลน์ — บันทึกเข้าคิว</div>

<!-- Modal -->
<div class="modal-bd" id="modal_bd">
  <div class="modal-box mt-12" id="modal_box"></div>
</div>

<script src="assets/config.js"></script>
<script src="assets/menus.js"></script>
<script src="assets/menu-store.js"></script>
<script src="assets/api.js"></script>
<script src="assets/auth.js"></script>
<script>
  // ── Auth guard: admin or super only ──────────────────────────
  (function () {
    const auth = window.YY_AUTH;
    const storeId = auth.getStoreFromURL();
    if (!auth.isAuthed('admin', storeId) && !auth.isAuthed('super')) {
      location.replace('./start.html');
    }
  })();
</script>
<script src="assets/admin-app.js"></script>
</body>
</html>
