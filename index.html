<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>yellowyellow.co</title>
<meta http-equiv="refresh" content="0; url=./start.html" />
<style>
  html, body {
    margin: 0; padding: 0;
    min-height: 100dvh;
    background: #FAFAF9;
    font-family: 'Sarabun', system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    color: #44403C;
  }
  .loader {
    width: 36px; height: 36px;
    border: 3px solid #E7E5E4;
    border-top-color: #FACC15;
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { margin-top: 16px; font-size: 14px; color: #78716C; }
</style>
<script>
  // Hard redirect for SPA-aware browsers
  (function () {
    // Preserve query string (?store=X) if present so user lands on intended page
    const qs = location.search;
    location.replace('./start.html' + qs);
  })();
</script>
</head>
<body>
  <div style="text-align:center">
    <div class="loader"></div>
    <p>กำลังเปิดระบบ...</p>
  </div>
</body>
</html>
