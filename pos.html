<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>POS · พนักงาน — yellowyellow.co</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Sarabun:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  /* ===== POS-specific design system (adapted from Claude Design POS) ===== */
  .app {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background:
      radial-gradient(800px 400px at 100% -10%, color-mix(in srgb, var(--store) 6%, transparent), transparent),
      radial-gradient(800px 400px at -10% 110%, color-mix(in srgb, var(--store) 5%, transparent), transparent),
      var(--bg);
  }

  /* Header */
  .hdr {
    display: grid;
    grid-template-columns: minmax(220px, 1fr) auto minmax(220px, 1fr);
    align-items: center; gap: 18px;
    padding: 14px 24px;
    background: rgba(255,255,255,.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 50;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark {
    width: 42px; height: 42px; border-radius: 12px;
    display: grid; place-items: center; color: #fff;
    font-family: var(--font-display); font-weight: 800;
    font-size: 16px; letter-spacing: -0.04em;
    background: var(--store);
    box-shadow: 0 4px 14px color-mix(in srgb, var(--store) 35%, transparent);
    transition: background .25s ease;
  }
  .brand-name { font-family: var(--font-display); font-size: 17px; font-weight: 600; letter-spacing: -0.01em; line-height: 1.15; }
  .brand-tag { font-size: 11.5px; color: var(--muted); margin-top: 2px; }

  .store-tabs {
    display: flex; gap: 6px; padding: 4px;
    background: var(--surface-2); border-radius: 14px; border: 1px solid var(--border);
  }
  .store-tab {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px; border-radius: 10px;
    font-size: 13px; font-weight: 500;
    color: var(--text-2); transition: all .18s ease;
    white-space: nowrap;
  }
  .store-tab:hover { background: rgba(255,255,255,.6); }
  .store-tab.is-active { background: var(--surface); color: var(--c); box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 0 0 1px var(--ct); font-weight: 600; }
  .store-tab .dot { width: 8px; height: 8px; border-radius: 50%; }
  .store-tab-route { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; opacity: 0.7; }

  .hdr-right { display: flex; align-items: center; gap: 10px; justify-content: flex-end; }
  .ghost-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface);
    font-size: 13px; font-weight: 500; color: var(--text-2);
    transition: all .15s ease;
  }
  .ghost-btn:hover { border-color: var(--border-strong); background: var(--surface-2); }
  .ghost-btn.danger { color: #B91C1C; }
  .ghost-btn.danger:hover { background: #FEF2F2; border-color: #FCA5A5; }

  .mode-switch { display: flex; background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; padding: 3px; }
  .mode-btn { padding: 8px 16px; border-radius: 9px; font-size: 13px; font-weight: 500; color: var(--text-2); }
  .mode-btn.is-active { background: var(--store); color: #fff; font-weight: 600; box-shadow: 0 2px 6px color-mix(in srgb, var(--store) 30%, transparent); }

  /* Layout */
  .layout { flex: 1; display: grid; grid-template-columns: 1fr 380px; min-height: 0; }
  .layout.staff-mode { grid-template-columns: 1fr; }

  /* Customer view */
  .cust-view { display: grid; grid-template-columns: 220px 1fr; min-height: 0; }
  .cat-rail { border-right: 1px solid var(--border); padding: 18px 12px; display: flex; flex-direction: column; gap: 4px; background: rgba(255,255,255,.5); }
  .cat-rail-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); padding: 0 12px 8px; }
  .cat-rail-btn {
    display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 4px;
    padding: 10px 12px; border-radius: 10px; text-align: left;
    font-size: 14px; color: var(--text-2); transition: background .15s ease;
  }
  .cat-rail-btn:hover { background: var(--surface-2); }
  .cat-rail-btn.is-active { background: var(--store-light); color: var(--store); font-weight: 600; }
  .cat-rail-label { font-weight: 500; }
  .cat-rail-en { font-size: 11px; color: var(--muted); grid-column: 1; }
  .cat-rail-btn.is-active .cat-rail-en { color: inherit; opacity: 0.7; }
  .cat-rail-count {
    grid-row: 1 / 3; grid-column: 2; font-size: 12px; font-variant-numeric: tabular-nums;
    color: var(--muted); background: var(--surface); padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border);
  }
  .cat-rail-sep { height: 1px; background: var(--border); margin: 14px 8px; }

  .menu-area { padding: 22px 26px 60px; overflow-y: auto; }
  .menu-search {
    width: 100%; padding: 12px 16px 12px 42px; border-radius: 12px;
    border: 1px solid var(--border); font-size: 14px; background: var(--surface);
    margin-bottom: 18px; transition: border-color .15s;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 24 24' fill='none' stroke='%23999' stroke-width='2'><circle cx='11' cy='11' r='8'/><path d='m21 21-4.3-4.3'/></svg>");
    background-repeat: no-repeat; background-position: 14px center;
  }
  .menu-search:focus { outline: none; border-color: var(--store); box-shadow: 0 0 0 3px color-mix(in srgb, var(--store) 16%, transparent); }
  .menu-hero {
    border-radius: var(--radius-lg); color: #fff;
    padding: 24px 28px; margin-bottom: 24px;
    background: linear-gradient(135deg, var(--store), color-mix(in srgb, var(--store) 70%, black));
    box-shadow: 0 10px 30px color-mix(in srgb, var(--store) 25%, transparent);
    position: relative; overflow: hidden;
  }
  .menu-hero::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(135deg, rgba(255,255,255,.05) 0 1px, transparent 1px 12px); pointer-events: none; }
  .menu-hero-inner { display: flex; justify-content: space-between; align-items: end; gap: 24px; position: relative; }
  .menu-hero-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: .18em; text-transform: uppercase; opacity: .85; }
  .menu-hero-title { font-family: var(--font-display); font-size: 32px; font-weight: 600; margin: 6px 0 0; letter-spacing: -0.02em; line-height: 1.05; }
  .menu-hero-tag { font-size: 14px; opacity: .9; margin-top: 6px; }
  .menu-hero-meta {
    display: grid; gap: 6px; font-size: 13px;
    background: rgba(255,255,255,.15); backdrop-filter: blur(10px);
    border-radius: 12px; padding: 12px 16px; min-width: 220px;
  }
  .menu-hero-meta-row { display: flex; justify-content: space-between; gap: 16px; }
  .menu-hero-meta-row :first-child { opacity: .8; }
  .menu-hero-meta-row :last-child { font-weight: 600; }

  .menu-section + .menu-section { margin-top: 30px; }
  .menu-section-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; gap: 16px; }
  .menu-section-head h2 { font-family: var(--font-display); font-size: 20px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
  .menu-section-head span { font-size: 12px; color: var(--muted); }
  .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }

  /* Menu card */
  .menu-card {
    display: grid; grid-template-columns: 88px 1fr 36px;
    gap: 14px; align-items: center; padding: 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); text-align: left;
    transition: all .18s ease; position: relative;
  }
  .menu-card:hover { transform: translateY(-1px); border-color: var(--store-tint); box-shadow: 0 6px 20px color-mix(in srgb, var(--store) 12%, transparent); }
  .menu-card-th { font-family: var(--font-display); font-size: 15px; font-weight: 500; letter-spacing: -0.005em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .menu-card-en { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .menu-card-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
  .menu-card-price { display: flex; align-items: baseline; gap: 5px; }
  .menu-card-price-from { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .menu-card-price-num { font-family: var(--font-num); font-weight: 700; font-size: 16px; color: var(--text); font-variant-numeric: tabular-nums; }
  .menu-card-options { font-size: 11px; color: var(--muted); background: var(--surface-2); padding: 3px 8px; border-radius: 999px; }
  .menu-card-add {
    align-self: center; width: 32px; height: 32px; border-radius: 10px;
    background: var(--store); color: #fff; font-size: 22px; font-weight: 400;
    display: grid; place-items: center; line-height: 1; transition: transform .18s;
  }
  .menu-card:hover .menu-card-add { transform: scale(1.08); }

  /* Thumb */
  .thumb {
    border-radius: 14px; position: relative; overflow: hidden; flex-shrink: 0;
    width: 88px; height: 88px;
    background: repeating-linear-gradient(135deg, transparent 0 8px, rgba(255,255,255,.5) 8px 9px);
  }
  .thumb-glyph { position: absolute; inset: 0; display: grid; place-items: center; opacity: 0.7; }
  .thumb-mono { position: absolute; bottom: 4px; right: 6px; font-family: var(--font-display); font-size: 11px; font-weight: 700; opacity: 0.65; letter-spacing: -0.02em; }

  /* Cart */
  .cart { background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; position: sticky; top: 73px; height: calc(100vh - 73px); min-height: 0; }
  .cart-head { padding: 20px 20px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  .cart-title { font-family: var(--font-display); font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
  .cart-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .cart-clear { font-size: 12px; color: var(--muted); padding: 6px 10px; border-radius: 8px; background: var(--surface-2); }
  .cart-clear:hover { background: #fee; color: #b91c1c; }
  .cart-type { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; padding: 12px 14px 4px; }
  .type-btn { padding: 9px 8px; border-radius: 10px; background: var(--surface-2); font-size: 12.5px; font-weight: 500; color: var(--text-2); border: 1px solid transparent; transition: all .15s; }
  .type-btn:hover { background: var(--store-light); }
  .type-btn.is-active { background: var(--store-light); color: var(--store); border-color: var(--store-tint); font-weight: 600; }
  .cart-info { padding: 4px 14px 12px; display: grid; gap: 6px; }
  .cart-input { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); font-size: 13px; background: var(--surface); transition: border-color .15s; }
  .cart-input:focus { outline: none; border-color: var(--store); }

  .cart-list { flex: 1; overflow-y: auto; padding: 4px 14px; display: flex; flex-direction: column; gap: 8px; }
  .cart-empty { margin: auto; text-align: center; color: var(--muted); font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 40px 20px; }
  .cart-empty-glyph { width: 64px; height: 64px; border-radius: 50%; background: var(--surface-2); display: grid; place-items: center; font-size: 28px; }
  .cart-line { border: 1px solid var(--border); border-radius: 12px; padding: 11px 13px; background: var(--surface); animation: slideIn .2s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-4px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .cart-line-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .cart-line-name { flex: 1; min-width: 0; }
  .cart-line-th { font-weight: 500; font-size: 14px; }
  .cart-line-en { font-size: 11px; color: var(--muted); min-height: 14px; margin-top: 2px; }
  .cart-line-mods, .cart-line-note { font-size: 11px; color: var(--muted); margin-top: 3px; font-style: italic; }
  .cart-line-x { font-size: 18px; color: var(--muted); width: 24px; height: 24px; border-radius: 6px; display: grid; place-items: center; line-height: 1; }
  .cart-line-x:hover { background: #fee; color: #b91c1c; }
  .cart-line-bot { display: flex; justify-content: space-between; align-items: center; margin-top: 9px; }
  .cart-line-amt { font-family: var(--font-num); font-weight: 700; font-size: 14.5px; font-variant-numeric: tabular-nums; color: var(--store); }

  .qty-stepper { display: inline-flex; align-items: center; background: var(--surface-2); border-radius: 10px; padding: 2px; }
  .qty-stepper button { width: 32px; height: 32px; display: grid; place-items: center; border-radius: 8px; font-size: 16px; font-weight: 500; color: var(--text-2); transition: background .15s; }
  .qty-stepper button:hover { background: var(--surface); }
  .qty-stepper span { min-width: 28px; text-align: center; font-variant-numeric: tabular-nums; font-weight: 600; }
  .qty-stepper.small button { width: 26px; height: 26px; font-size: 14px; }
  .qty-stepper.small span { min-width: 22px; font-size: 13px; }

  .cart-foot { padding: 14px 16px 16px; border-top: 1px solid var(--border); background: linear-gradient(180deg, var(--surface), var(--store-light)); }
  .cart-totals { margin-bottom: 12px; }
  .cart-total-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-2); margin-bottom: 4px; }
  .cart-total-row :last-child { font-variant-numeric: tabular-nums; }
  .cart-grand { margin-top: 10px; padding-top: 12px; border-top: 1px dashed var(--border-strong); font-size: 16px; font-weight: 600; color: var(--text); }
  .cart-grand :last-child { font-family: var(--font-num); font-size: 22px; font-weight: 700; color: var(--store); }

  .discount-row { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .discount-chip { padding: 4px 10px; font-size: 11.5px; border-radius: 999px; background: var(--surface-2); color: var(--text-2); border: 1px solid transparent; }
  .discount-chip:hover { background: var(--store-tint); color: var(--store); }
  .discount-chip.is-active { background: var(--store-tint); color: var(--store); border-color: var(--store); font-weight: 600; }

  /* Primary button */
  .primary-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 12px;
    padding: 14px 18px; border-radius: 12px;
    background: var(--store); color: #fff;
    font-weight: 600; font-size: 15px;
    transition: transform .12s, box-shadow .15s, filter .15s;
    letter-spacing: -0.005em; white-space: nowrap;
    box-shadow: 0 4px 12px color-mix(in srgb, var(--store) 25%, transparent);
  }
  .primary-btn:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.05); }
  .primary-btn:active:not(:disabled) { transform: translateY(0); }
  .primary-btn:disabled { cursor: not-allowed; opacity: .55; box-shadow: none; }
  .primary-btn.full { width: 100%; }
  .primary-btn-price { font-family: var(--font-num); font-variant-numeric: tabular-nums; background: rgba(0,0,0,.18); padding: 4px 12px; border-radius: 8px; font-size: 14px; }

  /* Modal */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(28,25,23,.55); backdrop-filter: blur(8px); display: grid; place-items: center; z-index: 100; padding: 24px; animation: fadeIn .18s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal { background: var(--surface); border-radius: var(--radius-lg); max-width: 560px; width: 100%; max-height: 92vh; overflow: hidden; box-shadow: var(--shadow-lg); display: flex; flex-direction: column; position: relative; animation: rise .22s cubic-bezier(.2,.8,.2,1); }
  @keyframes rise { from { opacity: 0; transform: translateY(20px) scale(.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .modal-close { position: absolute; top: 14px; right: 14px; width: 32px; height: 32px; border-radius: 10px; background: rgba(0,0,0,.06); display: grid; place-items: center; font-size: 22px; line-height: 1; color: var(--text); z-index: 5; }
  .modal-close.light { background: rgba(255,255,255,.2); color: #fff; }
  .modal-close:hover { background: rgba(0,0,0,.12); }

  /* Customizer */
  .customizer-hero { padding: 24px 28px; display: flex; align-items: center; gap: 20px; background: linear-gradient(160deg, var(--store-tint), var(--store-light)); }
  .customizer-th { font-family: var(--font-display); font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  .customizer-en { font-size: 13px; color: var(--text-2); margin-top: 2px; }
  .customizer-base { margin-top: 6px; font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .customizer-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
  .opt-group + .opt-group { margin-top: 16px; }
  .opt-group-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; }
  .opt-group-th { font-weight: 600; font-size: 14px; }
  .opt-group-en { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 9px 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); font-size: 13px; color: var(--text-2); transition: all .15s; }
  .chip:hover { border-color: var(--border-strong); }
  .chip.is-active { border-color: var(--store); color: var(--store); background: color-mix(in srgb, var(--store) 8%, transparent); font-weight: 600; }
  .chip small { font-family: var(--font-num); font-size: 11px; font-variant-numeric: tabular-nums; opacity: 0.7; }
  .chip.is-active small { opacity: 1; }
  .note-input { width: 100%; padding: 11px 13px; border-radius: 10px; border: 1px solid var(--border); font-size: 14px; background: var(--surface); }
  .note-input:focus { outline: none; border-color: var(--store); }
  .customizer-foot { display: grid; grid-template-columns: auto 1fr; gap: 14px; padding: 14px 20px; border-top: 1px solid var(--border); background: var(--surface-2); }

  /* Staff view */
  .staff-view { padding: 24px 28px 60px; flex: 1; overflow-y: auto; min-height: 0; }
  .staff-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 24px; margin-bottom: 18px; }
  .staff-title { font-family: var(--font-display); font-size: 26px; font-weight: 600; letter-spacing: -0.015em; margin: 0; }
  .staff-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .staff-tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 22px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .staff-tab { display: inline-flex; align-items: center; gap: 8px; padding: 9px 14px; border-radius: 10px; font-size: 13px; font-weight: 500; color: var(--text-2); transition: all .15s; }
  .staff-tab:hover { background: var(--surface-2); }
  .staff-tab.is-active { background: var(--surface); font-weight: 600; box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 0 0 1px var(--store-tint); color: var(--store); }
  .staff-tab-count { font-family: var(--font-num); font-size: 11px; background: var(--surface-2); padding: 1px 7px; border-radius: 999px; font-variant-numeric: tabular-nums; }
  .staff-tab.is-active .staff-tab-count { background: var(--store-tint); color: var(--store); }

  .staff-empty { text-align: center; padding: 80px 20px; color: var(--muted); }
  .staff-empty-glyph { width: 80px; height: 80px; border-radius: 50%; background: var(--surface-2); display: grid; place-items: center; margin: 0 auto 18px; font-size: 32px; }
  .staff-empty-title { font-size: 16px; font-weight: 500; color: var(--text-2); }

  .order-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
  .order-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; display: flex; flex-direction: column; gap: 12px; cursor: pointer; transition: all .18s; border-top: 3px solid var(--store); }
  .order-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .order-card-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .order-card-id { display: flex; flex-direction: column; gap: 2px; }
  .order-card-no { font-family: var(--font-num); font-size: 17px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -.01em; }
  .order-card-where { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }
  .status-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .order-card-items { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 4px; font-size: 13px; }
  .order-card-items li { display: grid; grid-template-columns: 26px 1fr; align-items: baseline; gap: 6px; color: var(--text-2); }
  .order-card-qty { font-family: var(--font-num); font-weight: 700; font-variant-numeric: tabular-nums; color: var(--store); }
  .order-card-more { font-size: 11px; color: var(--muted); font-style: italic; grid-template-columns: 1fr !important; }
  .order-card-foot { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 1px dashed var(--border); }
  .order-card-meta { display: flex; gap: 14px; align-items: baseline; }
  .order-card-time { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .order-card-net { font-family: var(--font-num); font-weight: 700; font-size: 16px; font-variant-numeric: tabular-nums; }
  .order-card-actions { display: flex; gap: 6px; }
  .step-btn { background: var(--store); color: #fff; font-size: 12px; font-weight: 600; padding: 7px 12px; border-radius: 8px; }
  .step-btn:hover { filter: brightness(1.05); }
  .pay-btn { background: #059669; color: #fff; font-size: 12px; font-weight: 600; padding: 7px 12px; border-radius: 8px; }
  .pay-btn:hover { background: #047857; }
  .cancel-btn { background: var(--surface-2); font-size: 12px; font-weight: 500; color: var(--muted); padding: 7px 10px; border-radius: 8px; }
  .cancel-btn:hover { background: #fee; color: #b91c1c; }

  /* Tables */
  .table-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
  .table-cell {
    border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px;
    background: var(--surface); text-align: center; transition: all .18s;
    display: flex; flex-direction: column; gap: 4px; cursor: pointer;
  }
  .table-cell.occupied { background: linear-gradient(135deg, var(--store-light), var(--surface)); border-color: var(--store-tint); }
  .table-cell.occupied .table-no { color: var(--store); }
  .table-cell:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
  .table-no { font-family: var(--font-display); font-size: 22px; font-weight: 700; }
  .table-seats { font-size: 11px; color: var(--muted); }
  .table-status { font-size: 12px; font-weight: 600; margin-top: 4px; }
  .table-status.free { color: #059669; }
  .table-status.busy { color: var(--store); }

  /* Queue */
  .queue-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
  .queue-cell { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; text-align: center; display: flex; flex-direction: column; gap: 4px; }
  .queue-num { font-family: var(--font-num); font-size: 28px; font-weight: 700; color: var(--store); letter-spacing: -0.02em; }
  .queue-name { font-size: 13px; font-weight: 500; }
  .queue-tag { font-size: 11px; color: var(--muted); }

  /* Payment modal */
  .pay-modal { max-width: 780px; width: 100%; }
  .pay-head { background: var(--store); color: #fff; padding: 22px 28px; display: flex; justify-content: space-between; align-items: center; }
  .pay-head-title { font-family: var(--font-display); font-size: 20px; font-weight: 600; letter-spacing: -0.01em; }
  .pay-head-sub { font-size: 13px; opacity: 0.85; margin-top: 2px; }
  .pay-body { display: grid; grid-template-columns: 1.1fr 1fr; }
  .pay-summary { padding: 22px 26px; background: var(--surface-2); display: flex; flex-direction: column; gap: 6px; max-height: 70vh; overflow-y: auto; }
  .pay-line { display: grid; grid-template-columns: 30px 1fr auto; gap: 10px; font-size: 13px; align-items: baseline; padding: 4px 0; }
  .pay-line-qty { font-family: var(--font-num); font-weight: 700; font-variant-numeric: tabular-nums; color: var(--store); }
  .pay-line-name { color: var(--text-2); line-height: 1.35; }
  .pay-line-amt { font-family: var(--font-num); font-variant-numeric: tabular-nums; font-weight: 600; }
  .pay-divider { height: 1px; background: var(--border); margin: 10px 0; }
  .pay-total { font-size: 16px !important; font-weight: 700; color: var(--text) !important; padding-top: 6px !important; border-top: 1px dashed var(--border-strong); }
  .pay-total .pay-line-amt { font-family: var(--font-num); font-size: 22px; color: var(--store); }
  .pay-side { padding: 22px 26px; display: flex; flex-direction: column; gap: 12px; }
  .pay-methods { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .pay-method { border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 6px; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 11.5px; font-weight: 500; color: var(--text-2); transition: all .15s; background: var(--surface); }
  .pay-method:hover { border-color: var(--border-strong); }
  .pay-method.is-active { font-weight: 600; background: var(--store-light); color: var(--store); border-color: var(--store); }
  .pay-method-ic { font-size: 20px; }
  .pay-input { padding: 13px 16px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 22px; font-weight: 600; font-family: var(--font-num); font-variant-numeric: tabular-nums; width: 100%; background: var(--surface); }
  .pay-input:focus { outline: none; border-color: var(--store); }
  .pay-presets { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .pay-preset { padding: 8px 4px; border-radius: 8px; background: var(--surface-2); font-size: 12px; font-family: var(--font-num); font-weight: 600; font-variant-numeric: tabular-nums; }
  .pay-preset:hover { background: var(--store-tint); color: var(--store); }
  .pay-change { display: flex; justify-content: space-between; align-items: center; padding: 13px 16px; background: var(--store-light); border-radius: 12px; border: 1px dashed var(--store-tint); font-size: 14px; }
  .pay-change :last-child { font-family: var(--font-num); font-size: 22px; font-weight: 700; color: var(--store); font-variant-numeric: tabular-nums; }
  .pay-change.is-short :last-child { color: #B91C1C; }
  .pay-qr-block { text-align: center; padding: 14px; background: var(--surface-2); border-radius: 12px; }
  .pay-qr-render { display: grid; place-items: center; padding: 8px; background: #fff; border-radius: 10px; }

  /* Receipt */
  .receipt {
    font-family: 'Sarabun', monospace;
    width: 80mm; max-width: 100%; padding: 14px;
    background: #fff; color: #000;
  }
  .receipt-head { text-align: center; border-bottom: 1px dashed #000; padding-bottom: 10px; }
  .receipt-head h2 { margin: 0; font-family: var(--font-display); font-weight: 700; }
  .receipt-meta { font-size: 11px; margin: 6px 0; }
  .receipt-line { display: grid; grid-template-columns: 20px 1fr auto; gap: 6px; font-size: 12px; padding: 3px 0; }
  .receipt-total { border-top: 1px dashed #000; margin-top: 8px; padding-top: 8px; font-size: 14px; }
  .receipt-grand { font-weight: 700; font-size: 16px; }

  /* Dashboard widget */
  .dash-widget { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
  .dash-tile { background: var(--surface); border: 1px solid var(--border); border-top: 3px solid var(--store); border-radius: 14px; padding: 14px 16px; }
  .dash-tile-label { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); font-weight: 500; }
  .dash-tile-value { font-family: var(--font-num); font-size: 22px; font-weight: 700; margin-top: 4px; letter-spacing: -.02em; font-variant-numeric: tabular-nums; }
  .dash-tile-hint { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Settings */
  .settings-modal { max-width: 540px; padding: 26px 30px; }
  .settings-title { font-family: var(--font-display); font-size: 22px; font-weight: 600; margin: 0; }
  .settings-sub { font-size: 13px; color: var(--muted); margin: 4px 0 18px; }
  .settings-field { display: grid; gap: 4px; margin-bottom: 12px; }
  .settings-field label { font-size: 12px; font-weight: 600; color: var(--text-2); }
  .settings-actions { display: flex; gap: 8px; margin-top: 14px; }

  /* Footer */
  .appfoot { padding: 10px 24px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); background: var(--surface); display: flex; justify-content: space-between; align-items: center; }
  .appfoot code { background: var(--surface-2); padding: 2px 6px; border-radius: 4px; }
  .conn-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #10b981; margin-right: 6px; }
  .conn-dot.off { background: var(--warn); }

  /* Responsive */
  @media (max-width: 1100px) {
    .layout { grid-template-columns: 1fr 340px; }
    .cust-view { grid-template-columns: 180px 1fr; }
    .pay-body { grid-template-columns: 1fr; }
    .dash-widget { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 820px) {
    .hdr { grid-template-columns: 1fr; gap: 10px; padding: 12px 14px; }
    .hdr-right { justify-content: flex-start; flex-wrap: wrap; }
    .store-tabs { width: 100%; overflow-x: auto; }
    .layout { grid-template-columns: 1fr; }
    .cust-view { grid-template-columns: 1fr; }
    .cat-rail { flex-direction: row; overflow-x: auto; border-right: none; border-bottom: 1px solid var(--border); padding: 10px; }
    .cat-rail-title, .cat-rail-sep { display: none; }
    .cat-rail-btn { flex-shrink: 0; grid-template-columns: auto auto; }
    .menu-area { padding: 14px; }
    .menu-hero-inner { flex-direction: column; align-items: flex-start; }
    .menu-hero-title { font-size: 26px; }
    .cart {
      position: fixed; bottom: 0; left: 0; right: 0; top: auto;
      height: 78vh; transform: translateY(calc(100% - 88px));
      transition: transform .25s ease; z-index: 30;
      border-left: none; border-top: 1px solid var(--border);
      border-radius: 22px 22px 0 0;
    }
    .cart.is-open { transform: translateY(0); }
    .cart-handle { display: flex; justify-content: center; padding: 8px 0 4px; }
    .cart-handle::before { content: ''; width: 38px; height: 4px; background: var(--border-strong); border-radius: 999px; }
    .pay-methods { grid-template-columns: repeat(2, 1fr); }
    .dash-widget { grid-template-columns: repeat(2, 1fr); }
  }

  @media print {
    .hdr, .cart, .appfoot, .staff-tabs, .modal-backdrop:not(.print-only), .no-print { display: none !important; }
    body { background: #fff; }
  }
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="yy-offline" id="yy-offline">⚠ ออฟไลน์ — กำลังบันทึกเข้าคิว</div>
<div class="yy-toast" id="yy-toast"><span id="yy-toast-msg">—</span></div>

<!-- Hidden print frame -->
<iframe id="print-frame" style="display:none;width:0;height:0;border:0;"></iframe>

<!-- Data + API + Auth + UI -->
<script src="assets/config.js"></script>
<script src="assets/menus.js"></script>
<script src="assets/menu-store.js"></script>
<script src="assets/api.js"></script>
<script src="assets/auth.js"></script>
<script>
  // ── Auth guard: redirect to start.html if not authed ──────────
  (function () {
    const auth = window.YY_AUTH;
    const storeId = auth.getStoreFromURL();
    if (!auth.isAuthed('staff', storeId) && !auth.isAuthed('admin', storeId) && !auth.isAuthed('super')) {
      location.replace('./start.html');
    }
  })();
</script>
<script src="assets/pos-app.js"></script>
</body>
</html>
